<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nendo — VRM viewer (almide + obsid)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overscroll-behavior: none; touch-action: none; }
    body { overflow: hidden; background: #1a1a2e; font-family: -apple-system, system-ui, sans-serif; color: #fff; }
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }

    #dropzone {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; pointer-events: none;
    }
    #dropzone.active { pointer-events: auto; background: rgba(0,0,0,0.7); }
    #drop-label {
      font-size: 20px; color: #888; padding: 40px;
      border: 2px dashed #444; border-radius: 16px;
      pointer-events: auto; cursor: pointer; text-align: center;
    }
    #drop-label:hover { border-color: #888; color: #ccc; }
    #dropzone.active #drop-label { border-color: #4af; color: #4af; }

    #info {
      position: fixed; bottom: 12px; left: 12px;
      font: 12px/1.5 monospace; color: #666;
    }
    #stats {
      position: fixed; top: 12px; right: 12px;
      font: 13px/1.5 monospace; color: #888;
      background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 6px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="canvas" class="hidden"></canvas>

  <div id="dropzone">
    <div id="drop-label">
      Drop VRM / GLB file here<br>
      <span style="font-size:13px;color:#555">or click to select</span>
      <input type="file" id="file-input" accept=".vrm,.glb" style="display:none">
    </div>
  </div>

  <div id="info">nendo — almide + obsid (no three.js)</div>
  <div id="stats" class="hidden">— fps</div>

  <!-- obsid host JS (WebGL bootstrap) -->
  <script src="obsid-gl.js"></script>
  <script src="obsid.js"></script>

  <script>
    const canvas = document.getElementById("canvas");
    const dropzone = document.getElementById("dropzone");
    const dropLabel = document.getElementById("drop-label");
    const fileInput = document.getElementById("file-input");
    const statsEl = document.getElementById("stats");
    const infoEl = document.getElementById("info");

    let wasmExports = null;
    let wasmMemory = null;
    let obsidReady = false;

    // ── WASM Loading via Obsid ──

    async function initObsid() {
      if (obsidReady) return;

      // Check if Obsid already loaded WASM (auto-load from obsid.js)
      if (Obsid._instance) {
        wasmExports = Obsid._instance.exports;
        wasmMemory = Obsid._memory || wasmExports?.memory;
        obsidReady = true;
        return;
      }

      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.classList.remove("hidden");

      await Obsid.load("nendo.wasm", "canvas", "high");
      wasmExports = Obsid._instance?.exports;
      wasmMemory = Obsid._memory || wasmExports?.memory;
      obsidReady = true;
    }

    // Load WASM immediately on page load
    initObsid().catch(e => console.warn("init:", e.message));

    // ── VRM Loading ──

    async function loadVRM(arrayBuffer) {
      // Wait for WASM if not ready yet
      if (!obsidReady) {
        try { await initObsid(); } catch(e) {
          infoEl.textContent = `Init error: ${e.message}`;
          return;
        }
      }
      if (!wasmExports) {
        infoEl.textContent = "WASM not loaded";
        return;
      }

      const data = new Uint8Array(arrayBuffer);
      const memory = wasmMemory;

      // Allocate Bytes in WASM via __alloc: [i32 len][data...]
      const totalSize = 4 + data.length;
      const ptr = wasmExports.__alloc(totalSize);
      const dv = new DataView(memory.buffer);
      dv.setInt32(ptr, data.length, true);
      new Uint8Array(memory.buffer, ptr + 4, data.length).set(data);

      console.log("calling inspect, ptr=", ptr, "len=", data.length);
      const resultPtr = wasmExports.inspect(ptr);
      console.log("resultPtr=", resultPtr);
      const resultStr = readWasmString(memory, resultPtr);
      console.log("result:", resultStr);

      let result;
      try { result = JSON.parse(resultStr); } catch { result = { ok: false, error: resultStr }; }

      if (result.error) {
        infoEl.textContent = `Error: ${result.error}`;
      } else {
        infoEl.textContent = `nendo — ${result.title || '(untitled)'} | v${result.version} | ${result.meshes} meshes, ${result.nodes} nodes`;
        dropzone.classList.add("hidden");
        // TODO: call load_vrm_3d + startRenderLoop once obsid rendering works
      }
    }

    function readWasmString(memory, ptr) {
      const view = new Uint8Array(memory.buffer);
      // almide WASM strings: [i32 len][bytes...]
      const len = new DataView(memory.buffer).getInt32(ptr, true);
      const bytes = view.slice(ptr + 4, ptr + 4 + len);
      return new TextDecoder().decode(bytes);
    }

    // ── Render Loop ──

    let rendering = false;
    function startRenderLoop() {
      if (rendering) return;
      rendering = true;

      let frames = 0, lastTime = performance.now();
      function loop() {
        if (wasmExports.render_frame) wasmExports.render_frame();

        frames++;
        const now = performance.now();
        if (now - lastTime >= 500) {
          const fps = (frames * 1000 / (now - lastTime)).toFixed(1);
          statsEl.textContent = `${fps} fps`;
          frames = 0;
          lastTime = now;
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      // Pointer events → WASM orbit camera
      canvas.addEventListener("pointerdown", e => {
        wasmExports.on_pointer_down?.(e.clientX, e.clientY);
      });
      canvas.addEventListener("pointerup", () => {
        wasmExports.on_pointer_up?.();
      });
      canvas.addEventListener("pointermove", e => {
        wasmExports.on_pointer_move?.(e.clientX, e.clientY);
      });
      canvas.addEventListener("wheel", e => {
        e.preventDefault();
        wasmExports.on_wheel?.(e.deltaY);
      }, { passive: false });
    }

    // ── Drag & Drop (registered immediately) ──

    document.body.addEventListener("dragover", e => { e.preventDefault(); e.stopPropagation(); });
    document.body.addEventListener("drop", async e => {
      e.preventDefault();
      e.stopPropagation();
      console.log("drop:", e.dataTransfer?.files[0]?.name);
      const file = e.dataTransfer?.files[0];
      if (file) {
        try { await loadVRM(await file.arrayBuffer()); }
        catch(err) { console.error("loadVRM error:", err); infoEl.textContent = "Error: " + err.message; }
      }
    });

    // Click to select
    dropLabel.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (file) {
        try { await loadVRM(await file.arrayBuffer()); }
        catch(err) { console.error("loadVRM error:", err); infoEl.textContent = "Error: " + err.message; }
      }
    });

    // Resize
    window.addEventListener("resize", () => {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
    });
  </script>
</body>
</html>
