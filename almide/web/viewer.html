<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nendo — VRM viewer (almide + obsid)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overscroll-behavior: none; touch-action: none; }
    body { overflow: hidden; background: #1a1a2e; font-family: -apple-system, system-ui, sans-serif; color: #fff; }
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }

    #dropzone {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; pointer-events: none;
    }
    #dropzone.active { pointer-events: auto; background: rgba(0,0,0,0.7); }
    #drop-label {
      font-size: 20px; color: #888; padding: 40px;
      border: 2px dashed #444; border-radius: 16px;
      pointer-events: auto; cursor: pointer; text-align: center;
    }
    #drop-label:hover { border-color: #888; color: #ccc; }
    #dropzone.active #drop-label { border-color: #4af; color: #4af; }

    #info {
      position: fixed; bottom: 12px; left: 12px;
      font: 12px/1.5 monospace; color: #666;
    }
    #stats {
      position: fixed; top: 12px; right: 12px;
      font: 13px/1.5 monospace; color: #888;
      background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 6px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="canvas" class="hidden"></canvas>

  <div id="dropzone">
    <div id="drop-label">
      Drop VRM / GLB file here<br>
      <span style="font-size:13px;color:#555">or click to select</span>
      <input type="file" id="file-input" accept=".vrm,.glb" style="display:none">
    </div>
  </div>

  <div id="info">nendo — almide + obsid (no three.js)</div>
  <div id="stats" class="hidden">— fps</div>

  <!-- obsid host JS (WebGL bootstrap) -->
  <script src="obsid-gl.js"></script>
  <script src="obsid.js"></script>

  <script>
    const canvas = document.getElementById("canvas");
    const dropzone = document.getElementById("dropzone");
    const dropLabel = document.getElementById("drop-label");
    const fileInput = document.getElementById("file-input");
    const statsEl = document.getElementById("stats");
    const infoEl = document.getElementById("info");

    let wasmInstance = null;
    let wasmMemory = null;

    // ── WASM Loading ──

    async function initWasm() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;

      // Load nendo.wasm with obsid imports
      const result = await Obsid.loadRaw("nendo.wasm", "canvas", "high");
      wasmInstance = result.instance;
      wasmMemory = result.memory;
    }

    // ── VRM Loading ──

    async function loadVRM(arrayBuffer) {
      if (!wasmInstance) await initWasm();

      const data = new Uint8Array(arrayBuffer);
      const exports = wasmInstance.exports;
      const memory = wasmMemory || exports.memory;

      // Allocate WASM memory and copy file data
      const ptr = exports.alloc(data.length);
      const view = new Uint8Array(memory.buffer, ptr, data.length);
      view.set(data);

      // Call nendo WASM: load_vrm_3d(ptr, len) → json string ptr
      const resultPtr = exports.load_vrm_3d(ptr, data.length);
      const resultStr = readWasmString(memory, resultPtr);
      const result = JSON.parse(resultStr);

      if (result.ok) {
        infoEl.textContent = `nendo — ${result.meshes} mesh(es) loaded`;
        dropzone.classList.add("hidden");
        canvas.classList.remove("hidden");
        statsEl.classList.remove("hidden");
        startRenderLoop(exports);
      } else {
        infoEl.textContent = `Error: ${result.error}`;
      }
    }

    function readWasmString(memory, ptr) {
      const view = new Uint8Array(memory.buffer);
      // almide strings: [i32 len][bytes...]
      const len = new DataView(memory.buffer).getInt32(ptr, true);
      const bytes = view.slice(ptr + 4, ptr + 4 + len);
      return new TextDecoder().decode(bytes);
    }

    // ── Render Loop ──

    let rendering = false;
    function startRenderLoop(exports) {
      if (rendering) return;
      rendering = true;

      let frames = 0, lastTime = performance.now();
      function loop() {
        exports.render_frame();

        frames++;
        const now = performance.now();
        if (now - lastTime >= 500) {
          const fps = (frames * 1000 / (now - lastTime)).toFixed(1);
          statsEl.textContent = `${fps} fps`;
          frames = 0;
          lastTime = now;
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      // Pointer events → WASM orbit camera
      canvas.addEventListener("pointerdown", e => {
        exports.on_pointer_down(e.clientX, e.clientY);
      });
      canvas.addEventListener("pointerup", () => {
        exports.on_pointer_up();
      });
      canvas.addEventListener("pointermove", e => {
        exports.on_pointer_move(e.clientX, e.clientY);
      });
      canvas.addEventListener("wheel", e => {
        e.preventDefault();
        exports.on_wheel(e.deltaY);
      }, { passive: false });
    }

    // ── Drag & Drop ──

    document.addEventListener("dragover", e => {
      e.preventDefault();
      dropzone.classList.add("active");
    });
    document.addEventListener("dragleave", e => {
      if (e.relatedTarget === null) dropzone.classList.remove("active");
    });
    document.addEventListener("drop", async e => {
      e.preventDefault();
      dropzone.classList.remove("active");
      const file = e.dataTransfer?.files[0];
      if (file) loadVRM(await file.arrayBuffer());
    });

    // Click to select
    dropLabel.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (file) loadVRM(await file.arrayBuffer());
    });

    // Resize
    window.addEventListener("resize", () => {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
    });
  </script>
</body>
</html>
