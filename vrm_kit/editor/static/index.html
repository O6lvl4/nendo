<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vrm-kit editor</title>
<style>
:root {
  --bg: #111118;
  --panel: #1a1a28;
  --panel2: #222235;
  --border: #2a2a40;
  --text: #e8e8f0;
  --dim: #7878a0;
  --accent: #00ff99;
  --accent-dim: rgba(0,255,153,0.15);
  --accent2: #4cc9f0;
  --warn: #ff6b6b;
  --input-bg: #14142a;
  --hover: #2a2a50;
  --radius: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  overflow: hidden;
  height: 100vh;
  display: flex;
}

/* ---- Viewport ---- */
#viewport { flex: 1; position: relative; }
canvas { display: block; width: 100%; height: 100%; }
#viewport-overlay {
  position: absolute; top: 12px; left: 12px;
  display: flex; gap: 6px;
}
.view-btn {
  padding: 5px 10px;
  background: rgba(20,20,40,0.8);
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 11px;
  backdrop-filter: blur(8px);
}
.view-btn:hover { color: var(--text); border-color: var(--accent); }

/* ---- Side panel ---- */
#panel {
  width: 380px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.panel-header {
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-header .save-btn {
  padding: 4px 14px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}
.panel-header .save-btn:hover { opacity: 0.85; }

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--panel2);
}
.tab {
  flex: 1;
  padding: 10px 4px;
  text-align: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--dim);
  font-size: 12px;
  font-weight: 500;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.tab-content { display: none; flex: 1; overflow-y: auto; }
.tab-content.active { display: block; }

/* Scrollbar */
.tab-content::-webkit-scrollbar { width: 5px; }
.tab-content::-webkit-scrollbar-track { background: transparent; }
.tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ---- Parts tab ---- */
.part-item {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  gap: 10px;
}
.part-item:hover { background: var(--hover); }
.part-item.selected { background: var(--accent-dim); }
.part-toggle {
  width: 18px; height: 18px;
  border: 1.5px solid var(--dim);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  font-size: 12px;
  color: var(--accent);
  transition: all 0.1s;
}
.part-toggle.on { border-color: var(--accent); background: var(--accent-dim); }
.part-toggle.on::after { content: "\2713"; }
.part-name { flex: 1; font-size: 13px; }
.part-info { font-size: 11px; color: var(--dim); }

/* ---- Category sections ---- */
.category {
  border-bottom: 1px solid var(--border);
}
.category-header {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  cursor: pointer;
  user-select: none;
  gap: 8px;
  font-weight: 500;
  font-size: 13px;
  color: var(--accent2);
  background: var(--panel2);
}
.category-header:hover { background: var(--hover); }
.category-arrow {
  font-size: 10px;
  transition: transform 0.15s;
  color: var(--dim);
}
.category.collapsed .category-arrow { transform: rotate(-90deg); }
.category.collapsed .category-body { display: none; }
.category-body { padding: 6px 0; }
.category-count {
  font-size: 11px;
  color: var(--dim);
  margin-left: auto;
}

/* ---- Sliders ---- */
.slider-row {
  display: flex;
  align-items: center;
  padding: 3px 16px 3px 24px;
  gap: 8px;
}
.slider-row label {
  min-width: 110px;
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--dim);
  flex-shrink: 0;
  cursor: default;
}
.slider-row label:hover { color: var(--text); }
.slider-row input[type="range"] {
  flex: 1;
  accent-color: var(--accent);
  height: 3px;
  cursor: pointer;
}
.slider-row .val {
  min-width: 30px;
  text-align: right;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
}
.slider-row.modified label { color: var(--accent); }

/* ---- Color picker ---- */
.color-row {
  display: flex;
  align-items: center;
  padding: 6px 16px 6px 24px;
  gap: 10px;
}
.color-row label {
  min-width: 80px;
  font-size: 12px;
  color: var(--dim);
}
.color-swatch {
  width: 28px; height: 28px;
  border-radius: 4px;
  border: 2px solid var(--border);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.color-swatch input[type="color"] {
  position: absolute;
  inset: -4px;
  width: 36px; height: 36px;
  border: none;
  cursor: pointer;
  opacity: 0;
}
.color-hex {
  font-size: 11px;
  color: var(--dim);
  font-family: monospace;
}

/* ---- Search ---- */
.search-box {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.search-box input {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: var(--radius);
  font-size: 12px;
}
.search-box input:focus { outline: none; border-color: var(--accent2); }
.search-box input::placeholder { color: var(--dim); }

/* ---- Meta fields ---- */
.field {
  display: flex;
  align-items: center;
  padding: 5px 16px;
  gap: 10px;
}
.field label {
  min-width: 100px;
  font-size: 12px;
  color: var(--dim);
}
.field input[type="text"] {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 8px;
  border-radius: 4px;
  font-size: 12px;
}
.field input:focus { outline: none; border-color: var(--accent2); }

/* ---- Status / Toast ---- */
#status {
  padding: 6px 16px;
  font-size: 11px;
  color: var(--dim);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: #000;
  padding: 8px 24px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.25s;
  z-index: 100;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="viewport">
  <canvas id="canvas"></canvas>
  <div id="viewport-overlay">
    <button class="view-btn" data-view="full">Full</button>
    <button class="view-btn" data-view="face">Face</button>
    <button class="view-btn" data-view="front">Front</button>
    <button class="view-btn" data-view="side">Side</button>
    <button class="view-btn" data-view="back">Back</button>
  </div>
</div>

<div id="panel">
  <div class="panel-header">
    <span>vrm-kit editor</span>
    <button class="save-btn" id="save-all">Save</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="parts">Parts</div>
    <div class="tab" data-tab="shape">Shape</div>
    <div class="tab" data-tab="face">Face</div>
    <div class="tab" data-tab="material">Material</div>
    <div class="tab" data-tab="meta">Meta</div>
  </div>

  <!-- Parts: mesh visibility + per-mesh shape keys -->
  <div id="tab-parts" class="tab-content active">
    <div id="parts-list"></div>
  </div>

  <!-- Shape: body proportion shape keys -->
  <div id="tab-shape" class="tab-content">
    <div class="search-box"><input type="text" id="shape-search" placeholder="Search body shape keys..."></div>
    <div id="shape-categories"></div>
  </div>

  <!-- Face: expression / face shape keys -->
  <div id="tab-face" class="tab-content">
    <div class="search-box"><input type="text" id="face-search" placeholder="Search face shape keys..."></div>
    <div id="face-categories"></div>
  </div>

  <!-- Material -->
  <div id="tab-material" class="tab-content">
    <div id="material-list"></div>
  </div>

  <!-- Meta -->
  <div id="tab-meta" class="tab-content">
    <div style="padding:10px 0">
      <div id="meta-fields"></div>
    </div>
  </div>

  <div id="status">Loading...</div>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as VRMModule from '@pixiv/three-vrm';

const { VRMLoaderPlugin, VRMUtils } = VRMModule;

// ---- State ----
let vrm = null;
let gltf = null;
const clock = new THREE.Clock();
const modifiedWeights = {};   // meshIdx -> { skName: value }
const modifiedMaterials = {}; // matIdx  -> { baseColor: [r,g,b,a] }

// ---- Three.js ----
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111118);

const camera = new THREE.PerspectiveCamera(28, 1, 0.05, 100);
camera.position.set(0, 1.3, -2.5);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(1, 3, -3);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0xaabbff, 0.4);
dirLight2.position.set(-2, 1, 2);
scene.add(dirLight2);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// Grid
const grid = new THREE.GridHelper(10, 20, 0x222240, 0x1a1a30);
scene.add(grid);

function resize() {
  const vp = document.getElementById('viewport');
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  camera.aspect = vp.clientWidth / vp.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ---- Helpers ----
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ---- Camera views ----
function moveCameraTo(pos, target) {
  camera.position.set(...pos);
  controls.target.set(...target);
  controls.update();
}
function getModelBounds() {
  if (!vrm) return { center: [0, 1, 0], size: [1, 1.6, 1] };
  const box = new THREE.Box3().setFromObject(vrm.scene);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  return { center: [c.x, c.y, c.z], size: [s.x, s.y, s.z] };
}
document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    const { center: c, size: s } = getModelBounds();
    const views = {
      full:  () => moveCameraTo([c[0], c[1]+s[1]*0.1, c[2]-s[1]*1.4], c),
      face:  () => moveCameraTo([c[0], c[1]+s[1]*0.36, c[2]-0.55], [c[0], c[1]+s[1]*0.36, c[2]]),
      front: () => moveCameraTo([c[0], c[1], c[2]-s[1]*1.2], c),
      side:  () => moveCameraTo([c[0]-s[1]*1.2, c[1], c[2]], c),
      back:  () => moveCameraTo([c[0], c[1], c[2]+s[1]*1.2], c),
    };
    views[btn.dataset.view]?.();
  });
});

// ---- Tabs ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

// ---- Shape key categorization ----
const FACE_CATEGORIES = {
  'Eyes':      /^(eye_|Eye_|LowerEyelid|highlight_|eyelash_|eyelid_|eye[_\s])/i,
  'Mouth':     /^(mouth_|A$|I$|U$|E$|O$|A_|I_|U_|E_|O_|bero_|yaeba|gizaba|upper_tooth|lower_tooth)/i,
  'Eyebrows':  /^eyebrow_/i,
  'Face':      /^(cheek_|jaw_|nose_|ear_|face_)/i,
  'Effects':   /^Option_/i,
  'Lip Sync':  /^vrc\./i,
  'MMD':       /^(まばたき|笑い|ウィンク|なごみ|びっくり|じと目|ｷﾘ|星目|はぁと|瞳|光下|ハイライト|恐ろしい|Λ|▲|ワ|ω|□|はん|ん$|あ２|えー|にやり|にっこり|ぺろ|口角|真面目|困る|にこり|怒り|上$|下$|照れ|涙|はちゅ)/,
};

const BODY_CATEGORIES = {
  'Chest':     /^(Breasts?_|Nipple_|Bra_)/i,
  'Body':      /^(Waist_|Foot_|Nail_|Shoulder_OFF|face_|jaw_)/i,
  'Shrink':    /_(OFF|OFF_[LR])$/,
  'Hair':      /^(Bangs?_|Hair_|Ahoge|HairClip)/i,
  'Boots':     /^Boots?_/i,
  'Socks':     /^(Socks_|High-Socks|Crew-Socks|Knee)/i,
  'Blouse':    /^Blouse_/i,
};

function categorize(name, rules) {
  for (const [cat, re] of Object.entries(rules)) {
    if (re.test(name)) return cat;
  }
  return 'Other';
}

// ---- Collect mesh info ----
function collectMeshes() {
  const meshes = [];
  if (!vrm) return meshes;

  vrm.scene.traverse((obj) => {
    if (obj.isMesh || obj.isSkinnedMesh) {
      const info = {
        name: obj.name,
        object: obj,
        visible: obj.visible,
        vertices: obj.geometry?.attributes?.position?.count || 0,
        shapeKeys: [],
        materials: [],
      };

      // Shape keys
      if (obj.morphTargetDictionary) {
        for (const [name, idx] of Object.entries(obj.morphTargetDictionary)) {
          info.shapeKeys.push({
            name,
            index: idx,
            value: obj.morphTargetInfluences?.[idx] || 0,
          });
        }
        info.shapeKeys.sort((a, b) => a.name.localeCompare(b.name));
      }

      // Materials
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      info.materials = mats.filter(Boolean);

      meshes.push(info);
    }
  });

  meshes.sort((a, b) => a.name.localeCompare(b.name));
  return meshes;
}

// ---- Build Parts tab ----
function buildParts(meshes) {
  const container = document.getElementById('parts-list');
  container.innerHTML = '';

  for (const mesh of meshes) {
    const item = document.createElement('div');
    item.className = 'part-item';

    // Visibility toggle
    const toggle = document.createElement('div');
    toggle.className = `part-toggle ${mesh.visible ? 'on' : ''}`;
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      mesh.object.visible = !mesh.object.visible;
      toggle.classList.toggle('on');
    });

    const name = document.createElement('span');
    name.className = 'part-name';
    name.textContent = mesh.name;

    const info = document.createElement('span');
    info.className = 'part-info';
    const sk = mesh.shapeKeys.length;
    info.textContent = `${mesh.vertices.toLocaleString()}v` + (sk ? ` / ${sk}sk` : '');

    item.append(toggle, name, info);
    container.appendChild(item);

    // Click to expand per-mesh shape keys
    item.addEventListener('click', () => {
      document.querySelectorAll('.part-item').forEach(p => p.classList.remove('selected'));
      item.classList.add('selected');
      buildPartShapeKeys(mesh, container, item);
    });
  }
}

function buildPartShapeKeys(mesh, container, afterElem) {
  // Remove any existing inline detail
  container.querySelectorAll('.part-detail').forEach(d => d.remove());
  if (!mesh.shapeKeys.length) return;

  const detail = document.createElement('div');
  detail.className = 'part-detail';
  detail.style.background = 'var(--panel2)';
  detail.style.borderBottom = '1px solid var(--border)';
  detail.style.padding = '6px 0';

  for (const sk of mesh.shapeKeys) {
    if (sk.name === 'Basis') continue;
    const row = makeSlider(sk.name, sk.value, (v) => {
      mesh.object.morphTargetInfluences[sk.index] = v;
      trackWeight(mesh, sk.name, v);
    });
    detail.appendChild(row);
  }

  afterElem.after(detail);
}

// ---- Build Body Shape tab ----
function buildShapeTab(meshes) {
  const container = document.getElementById('shape-categories');
  container.innerHTML = '';

  const grouped = {};
  for (const mesh of meshes) {
    for (const sk of mesh.shapeKeys) {
      if (sk.name === 'Basis') continue;
      // Skip face-related shape keys (they go in Face tab)
      const faceCat = categorize(sk.name, FACE_CATEGORIES);
      if (faceCat !== 'Other' && mesh.name !== 'Body_Base') continue;

      const cat = categorize(sk.name, BODY_CATEGORIES);
      if (cat === 'Other' && categorize(sk.name, FACE_CATEGORIES) !== 'Other') continue;
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push({ ...sk, mesh });
    }
  }

  for (const [cat, items] of Object.entries(grouped)) {
    if (!items.length) continue;
    const section = makeCategory(cat, items.length, (body) => {
      for (const item of items) {
        const row = makeSlider(
          `${item.name}`,
          item.value,
          (v) => {
            item.mesh.object.morphTargetInfluences[item.index] = v;
            trackWeight(item.mesh, item.name, v);
          },
          item.mesh.name,
        );
        body.appendChild(row);
      }
    });
    container.appendChild(section);
  }
}

// ---- Build Face tab ----
function buildFaceTab(meshes) {
  const container = document.getElementById('face-categories');
  container.innerHTML = '';

  // Also include VRM expressions
  if (vrm?.expressionManager) {
    const exprSection = makeCategory('VRM Expressions', vrm.expressionManager.expressions.length, (body) => {
      for (const expr of vrm.expressionManager.expressions) {
        const row = makeSlider(expr.expressionName, 0, (v) => {
          vrm.expressionManager.setValue(expr.expressionName, v);
        });
        body.appendChild(row);
      }
    });
    container.appendChild(exprSection);
  }

  const grouped = {};
  for (const mesh of meshes) {
    for (const sk of mesh.shapeKeys) {
      if (sk.name === 'Basis') continue;
      const cat = categorize(sk.name, FACE_CATEGORIES);
      if (cat === 'Other') continue;
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push({ ...sk, mesh });
    }
  }

  for (const [cat, items] of Object.entries(grouped)) {
    if (!items.length) continue;
    const section = makeCategory(cat, items.length, (body) => {
      for (const item of items) {
        const row = makeSlider(item.name, item.value, (v) => {
          item.mesh.object.morphTargetInfluences[item.index] = v;
          trackWeight(item.mesh, item.name, v);
        });
        body.appendChild(row);
      }
    }, true); // collapsed by default
    container.appendChild(section);
  }
}

// ---- Build Material tab ----
function buildMaterialTab(meshes) {
  const container = document.getElementById('material-list');
  container.innerHTML = '';

  const seen = new Set();
  for (const mesh of meshes) {
    for (const mat of mesh.materials) {
      if (seen.has(mat.uuid)) continue;
      seen.add(mat.uuid);

      const section = document.createElement('div');
      section.className = 'category';

      const header = document.createElement('div');
      header.className = 'category-header';
      header.innerHTML = `<span class="category-arrow">&#9660;</span> ${mat.name || 'Material'}`;
      header.addEventListener('click', () => section.classList.toggle('collapsed'));

      const body = document.createElement('div');
      body.className = 'category-body';

      // Base color
      if (mat.color) {
        const row = makeColorPicker('Base Color', mat.color, (color) => {
          mat.color.copy(color);
          trackMaterialColor(mat);
        });
        body.appendChild(row);
      }

      // Emissive
      if (mat.emissive) {
        const row = makeColorPicker('Emissive', mat.emissive, (color) => {
          mat.emissive.copy(color);
        });
        body.appendChild(row);
      }

      // Opacity
      if (mat.opacity !== undefined) {
        const row = makeSlider('Opacity', mat.opacity, (v) => {
          mat.opacity = v;
          mat.transparent = v < 1;
        });
        body.appendChild(row);
      }

      section.append(header, body);
      container.appendChild(section);
    }
  }
}

// ---- Meta tab ----
async function buildMetaTab() {
  const resp = await fetch('/api/meta');
  const meta = await resp.json();
  const container = document.getElementById('meta-fields');
  container.innerHTML = '';
  for (const [key, val] of Object.entries(meta)) {
    const div = document.createElement('div');
    div.className = 'field';
    const label = document.createElement('label');
    label.textContent = key;
    const input = document.createElement('input');
    input.type = 'text';
    input.dataset.key = key;
    input.value = Array.isArray(val) ? val.join(', ') : (val ?? '');
    div.append(label, input);
    container.appendChild(div);
  }
}

// ---- UI component helpers ----
function makeSlider(label, initialValue, onChange, tooltip) {
  const row = document.createElement('div');
  row.className = 'slider-row';
  row.dataset.label = label.toLowerCase();

  const lbl = document.createElement('label');
  lbl.textContent = label;
  if (tooltip) lbl.title = `${tooltip} / ${label}`;

  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = '0';
  slider.max = '100';
  slider.value = String(Math.round(initialValue * 100));

  const val = document.createElement('span');
  val.className = 'val';
  val.textContent = slider.value;

  slider.addEventListener('input', () => {
    const v = parseInt(slider.value) / 100;
    onChange(v);
    val.textContent = slider.value;
    row.classList.toggle('modified', parseInt(slider.value) !== 0);
  });

  if (initialValue > 0) row.classList.add('modified');
  row.append(lbl, slider, val);
  return row;
}

function makeCategory(title, count, buildFn, collapsed = false) {
  const section = document.createElement('div');
  section.className = `category${collapsed ? ' collapsed' : ''}`;

  const header = document.createElement('div');
  header.className = 'category-header';

  const arrow = document.createElement('span');
  arrow.className = 'category-arrow';
  arrow.textContent = '\u25BC';

  const titleSpan = document.createElement('span');
  titleSpan.textContent = title;

  const countSpan = document.createElement('span');
  countSpan.className = 'category-count';
  countSpan.textContent = count;

  header.append(arrow, titleSpan, countSpan);

  const body = document.createElement('div');
  body.className = 'category-body';
  buildFn(body);

  header.addEventListener('click', () => section.classList.toggle('collapsed'));

  section.append(header, body);
  return section;
}

function makeColorPicker(label, threeColor, onChange) {
  const row = document.createElement('div');
  row.className = 'color-row';

  const lbl = document.createElement('label');
  lbl.textContent = label;

  const swatch = document.createElement('div');
  swatch.className = 'color-swatch';
  const hex = '#' + threeColor.getHexString();
  swatch.style.background = hex;

  const input = document.createElement('input');
  input.type = 'color';
  input.value = hex;

  const hexLabel = document.createElement('span');
  hexLabel.className = 'color-hex';
  hexLabel.textContent = hex;

  input.addEventListener('input', () => {
    const c = new THREE.Color(input.value);
    swatch.style.background = input.value;
    hexLabel.textContent = input.value;
    onChange(c);
  });

  swatch.appendChild(input);
  row.append(lbl, swatch, hexLabel);
  return row;
}

// ---- Search ----
function setupSearch(inputId, containerId) {
  document.getElementById(inputId)?.addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const container = document.getElementById(containerId);
    container.querySelectorAll('.slider-row').forEach(row => {
      row.style.display = row.dataset.label?.includes(q) ? '' : 'none';
    });
    // Show categories that have visible sliders
    container.querySelectorAll('.category').forEach(cat => {
      const visible = cat.querySelectorAll('.slider-row:not([style*="display: none"])').length;
      cat.style.display = visible ? '' : 'none';
      if (q && visible) cat.classList.remove('collapsed');
    });
  });
}

// ---- Track modifications for save ----
function trackWeight(mesh, skName, value) {
  // Find glTF mesh index
  const meshIdx = findGltfMeshIndex(mesh);
  if (meshIdx < 0) return;
  if (!modifiedWeights[meshIdx]) modifiedWeights[meshIdx] = {};
  modifiedWeights[meshIdx][skName] = value;
}

function findGltfMeshIndex(meshInfo) {
  if (!gltf) return -1;
  const gltfMeshes = gltf.parser?.json?.meshes || [];
  for (let i = 0; i < gltfMeshes.length; i++) {
    if (gltfMeshes[i].name === meshInfo.name) return i;
  }
  return -1;
}

function trackMaterialColor(mat) {
  if (!gltf) return;
  const gltfMats = gltf.parser?.json?.materials || [];
  for (let i = 0; i < gltfMats.length; i++) {
    if (gltfMats[i].name === mat.name) {
      modifiedMaterials[i] = {
        baseColor: [mat.color.r, mat.color.g, mat.color.b, mat.opacity ?? 1],
      };
      break;
    }
  }
}

// ---- Save all ----
document.getElementById('save-all').addEventListener('click', async () => {
  const payload = {};

  // Weights: convert { meshIdx: { skName: val } } to { meshIdx: [weights...] }
  if (Object.keys(modifiedWeights).length) {
    const weightsPayload = {};
    const gltfMeshes = gltf.parser?.json?.meshes || [];
    for (const [meshIdxStr, skMap] of Object.entries(modifiedWeights)) {
      const meshIdx = parseInt(meshIdxStr);
      const mesh = gltfMeshes[meshIdx];
      if (!mesh) continue;
      // Get current weights array (or create zeros)
      const numTargets = mesh.primitives?.[0]?.targets?.length || 0;
      const weights = mesh.weights ? [...mesh.weights] : new Array(numTargets).fill(0);
      // Map shape key names to indices
      const extras = mesh.extras?.targetNames || [];
      const prims = mesh.primitives || [];
      // Build name -> index from gltf
      const nameMap = {};
      if (extras.length) {
        extras.forEach((n, i) => nameMap[n] = i);
      } else if (prims[0]?.extras?.targetNames) {
        prims[0].extras.targetNames.forEach((n, i) => nameMap[n] = i);
      }
      // Also try from three.js mesh
      const threeMesh = findThreeMesh(mesh.name);
      if (threeMesh?.morphTargetDictionary) {
        Object.entries(threeMesh.morphTargetDictionary).forEach(([n, i]) => nameMap[n] = i);
      }

      for (const [name, val] of Object.entries(skMap)) {
        const idx = nameMap[name];
        if (idx !== undefined && idx < weights.length) weights[idx] = val;
      }
      weightsPayload[meshIdx] = weights;
    }
    payload.weights = weightsPayload;
  }

  // Materials
  if (Object.keys(modifiedMaterials).length) {
    payload.materials = modifiedMaterials;
  }

  // Meta
  const metaInputs = document.querySelectorAll('#meta-fields input');
  if (metaInputs.length) {
    const meta = {};
    metaInputs.forEach(input => {
      const key = input.dataset.key;
      const val = input.value;
      if (key === 'authors') {
        meta[key] = val.split(',').map(s => s.trim()).filter(Boolean);
      } else if (key === 'texture' || key === 'thumbnailImage') {
        meta[key] = parseInt(val) || 0;
      } else {
        meta[key] = val;
      }
    });
    // Save meta separately
    await fetch('/api/meta', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(meta),
    });
  }

  // Save customizations
  if (payload.weights || payload.materials) {
    await fetch('/api/save-customization', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  }

  showToast('Saved');
});

function findThreeMesh(name) {
  let found = null;
  vrm?.scene.traverse(obj => {
    if ((obj.isMesh || obj.isSkinnedMesh) && obj.name === name) found = obj;
  });
  return found;
}

// ---- Load VRM ----
const loader = new GLTFLoader();
loader.register((parser) => new VRMLoaderPlugin(parser));

async function loadVRM() {
  setStatus('Loading VRM...');
  const resp = await fetch('/api/vrm');
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);

  loader.load(url, (loaded) => {
    gltf = loaded;
    if (vrm) {
      VRMUtils.deepDispose(vrm.scene);
      scene.remove(vrm.scene);
    }

    vrm = loaded.userData.vrm;
    VRMUtils.rotateVRM0(vrm);
    scene.add(vrm.scene);

    // Auto-center
    const box = new THREE.Box3().setFromObject(vrm.scene);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    controls.target.copy(center);
    camera.position.set(center.x, center.y + size.y * 0.1, center.z - size.y * 1.4);
    controls.update();

    URL.revokeObjectURL(url);

    // Build UI
    const meshes = collectMeshes();
    buildParts(meshes);
    buildShapeTab(meshes);
    buildFaceTab(meshes);
    buildMaterialTab(meshes);
    buildMetaTab();
    setupSearch('shape-search', 'shape-categories');
    setupSearch('face-search', 'face-categories');

    setStatus(`${vrm.meta?.metaVersion || 'VRM'} | ${meshes.length} meshes | ${meshes.reduce((a, m) => a + m.shapeKeys.length, 0)} shape keys`);
  }, (p) => {
    if (p.total) setStatus(`Loading... ${Math.round(p.loaded / p.total * 100)}%`);
  }, (err) => {
    setStatus(`Error: ${err.message}`);
    console.error(err);
  });
}

// ---- Render loop ----
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (vrm) vrm.update(dt);
  controls.update();
  renderer.render(scene, camera);
}

loadVRM();
animate();
</script>
