<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nendo playground</title>
<style>
:root {
  --bg: #0e0e18; --panel: #161624; --panel2: #1e1e32;
  --border: #2a2a44; --text: #e8e8f0; --dim: #6868a0;
  --accent: #00ff99; --accent-dim: rgba(0,255,153,0.12);
  --accent2: #4cc9f0; --warn: #ff6b6b;
  --input-bg: #12122a; --hover: #28284a; --radius: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,"Segoe UI","Hiragino Sans",sans-serif;
  font-size: 13px; color: var(--text); background: var(--bg);
  overflow: hidden; height: 100vh; display: flex;
}
#viewport { flex:1; position:relative; }
canvas { display:block; width:100%; height:100%; }

/* Drop overlay */
#drop-overlay {
  position:absolute; inset:0; background:rgba(0,255,153,0.08);
  border:3px dashed var(--accent); display:none;
  align-items:center; justify-content:center; z-index:50;
  font-size:18px; font-weight:600; color:var(--accent);
}
#drop-overlay.show { display:flex; }

#top-bar {
  position:absolute; top:12px; left:12px; right:12px;
  display:flex; justify-content:space-between; align-items:center;
  pointer-events:none;
}
#top-bar > * { pointer-events:auto; }
.top-btn {
  padding:6px 14px; background:rgba(16,16,30,0.85); border:1px solid var(--border);
  color:var(--dim); border-radius:var(--radius); cursor:pointer; font-size:12px;
  backdrop-filter:blur(8px);
}
.top-btn:hover { color:var(--text); border-color:var(--accent); }
.top-btn.active { color:var(--accent); border-color:var(--accent); background:var(--accent-dim); }
#capture-btn { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }

/* Anim controls in viewport */
#anim-bar {
  position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:10px;
  background:rgba(16,16,30,0.9); border:1px solid var(--border);
  border-radius:8px; padding:8px 16px; backdrop-filter:blur(8px);
  pointer-events:auto;
}
#anim-bar .anim-name { font-size:12px; color:var(--accent2); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#anim-bar button {
  background:none; border:1px solid var(--border); color:var(--text);
  border-radius:4px; padding:4px 10px; cursor:pointer; font-size:12px;
}
#anim-bar button:hover { border-color:var(--accent); color:var(--accent); }
#anim-bar button.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
#anim-bar input[type="range"] { width:80px; accent-color:var(--accent); }
#anim-bar .speed-val { font-size:11px; color:var(--dim); min-width:30px; }

/* Panel */
#panel {
  width:400px; background:var(--panel); border-left:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.panel-header {
  padding:12px 16px; font-size:15px; font-weight:600;
  border-bottom:1px solid var(--border); color:var(--accent);
  display:flex; align-items:center; justify-content:space-between;
}
.panel-header a { color:var(--dim); font-size:12px; text-decoration:none; }
.panel-header a:hover { color:var(--accent2); }

/* Anim list */
.anim-section { border-bottom:1px solid var(--border); padding:10px 16px; }
.anim-section-title { font-size:11px; text-transform:uppercase; color:var(--dim); margin-bottom:8px; letter-spacing:0.05em; }
.anim-item {
  display:flex; align-items:center; padding:6px 10px; gap:8px;
  border-radius:var(--radius); cursor:pointer; margin-bottom:3px;
  border:1px solid transparent;
}
.anim-item:hover { background:var(--hover); }
.anim-item.active { border-color:var(--accent); background:var(--accent-dim); }
.anim-item .name { flex:1; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.anim-item .dur { font-size:11px; color:var(--dim); }
.anim-item .del { font-size:10px; color:var(--dim); cursor:pointer; padding:2px 4px; }
.anim-item .del:hover { color:var(--warn); }
.drop-hint {
  padding:12px; text-align:center; color:var(--dim); font-size:12px;
  border:1px dashed var(--border); border-radius:var(--radius);
}

/* Presets */
#presets {
  border-bottom:1px solid var(--border); padding:10px 16px;
  display:flex; flex-wrap:wrap; gap:6px; align-items:center;
}
.preset-chip {
  padding:5px 12px; background:var(--panel2); border:1px solid var(--border);
  border-radius:20px; cursor:pointer; font-size:12px; color:var(--dim);
  display:flex; align-items:center; gap:6px;
}
.preset-chip:hover { border-color:var(--accent2); color:var(--text); }
.preset-chip.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
.preset-chip .del { font-size:10px; opacity:0.4; cursor:pointer; }
.preset-chip .del:hover { opacity:1; color:var(--warn); }
#save-preset-btn {
  padding:5px 12px; background:var(--accent); color:#000; border:none;
  border-radius:20px; cursor:pointer; font-size:12px; font-weight:600;
}

.search { padding:8px 16px; border-bottom:1px solid var(--border); }
.search input {
  width:100%; background:var(--input-bg); border:1px solid var(--border);
  color:var(--text); padding:8px 12px; border-radius:var(--radius); font-size:13px;
}
.search input:focus { outline:none; border-color:var(--accent2); }

#expr-list { flex:1; overflow-y:auto; }
#expr-list::-webkit-scrollbar { width:5px; }
#expr-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.cat { border-bottom:1px solid var(--border); }
.cat-head {
  display:flex; align-items:center; padding:10px 16px; cursor:pointer;
  gap:8px; font-weight:500; font-size:13px; color:var(--accent2);
  background:var(--panel2); user-select:none;
}
.cat-head:hover { background:var(--hover); }
.cat-arrow { font-size:10px; color:var(--dim); transition:transform 0.15s; }
.cat.collapsed .cat-arrow { transform:rotate(-90deg); }
.cat.collapsed .cat-body { display:none; }
.cat-body { padding:4px 0; }
.cat-count { font-size:11px; color:var(--dim); margin-left:auto; }
.expr-row { display:flex; align-items:center; padding:3px 16px 3px 24px; gap:8px; }
.expr-row label {
  min-width:130px; font-size:11px; color:var(--dim); overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap; flex-shrink:0;
}
.expr-row label:hover { color:var(--text); }
.expr-row input[type="range"] { flex:1; accent-color:var(--accent); height:3px; }
.expr-row .val { min-width:28px; text-align:right; font-size:11px; font-variant-numeric:tabular-nums; color:var(--accent); }
.expr-row.active label { color:var(--accent); font-weight:500; }

#bottom-bar {
  padding:8px 16px; border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--dim);
}
.reset-btn {
  padding:5px 14px; background:var(--input-bg); border:1px solid var(--border);
  color:var(--text); border-radius:var(--radius); cursor:pointer; font-size:12px;
}
.reset-btn:hover { border-color:var(--warn); color:var(--warn); }

/* Loading overlay */
#loading-overlay {
  position:absolute; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:60; transition:opacity 0.4s;
}
#loading-overlay.hidden { opacity:0; pointer-events:none; }
.loader-ring {
  width:48px; height:48px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin 0.8s linear infinite; margin-bottom:16px;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loading-text { font-size:14px; color:var(--dim); }
#loading-pct { font-size:24px; font-weight:600; color:var(--accent); margin-bottom:4px; font-variant-numeric:tabular-nums; }

.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--accent); color:#000; padding:8px 24px; border-radius:var(--radius);
  font-size:13px; font-weight:600; opacity:0; transition:all 0.25s; z-index:100; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.dialog-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:none; align-items:center; justify-content:center; z-index:200;
}
.dialog-overlay.show { display:flex; }
.dialog { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:20px; min-width:300px; }
.dialog h3 { margin-bottom:12px; font-size:14px; color:var(--accent); }
.dialog input[type="text"] {
  width:100%; background:var(--input-bg); border:1px solid var(--border);
  color:var(--text); padding:8px 12px; border-radius:var(--radius); font-size:13px; margin-bottom:12px;
}
.dialog input:focus { outline:none; border-color:var(--accent2); }
.dialog-actions { display:flex; gap:8px; justify-content:flex-end; }
.dialog-actions button { padding:6px 16px; border-radius:var(--radius); cursor:pointer; font-size:12px; font-weight:600; border:1px solid var(--border); }
.dialog-actions .cancel { background:var(--input-bg); color:var(--text); }
.dialog-actions .ok { background:var(--accent); color:#000; border-color:var(--accent); }
</style>
</head>
<body>

<div id="viewport">
  <canvas id="canvas"></canvas>
  <div id="drop-overlay">Drop VRM / FBX here</div>
  <div id="loading-overlay">
    <div class="loader-ring"></div>
    <div id="loading-pct">0%</div>
    <div id="loading-text">Loading model...</div>
  </div>
  <div id="top-bar">
    <div style="display:flex;gap:6px">
      <button class="top-btn" data-view="face">Face</button>
      <button class="top-btn" data-view="bust">Bust</button>
      <button class="top-btn" data-view="full">Full</button>
    </div>
    <div style="display:flex;gap:6px">
      <button class="top-btn" id="capture-btn">Capture</button>
    </div>
  </div>
  <div id="anim-bar">
    <button id="anim-play">Pause</button>
    <span class="anim-name" id="anim-name">Idle</span>
    <input type="range" id="anim-speed" min="10" max="200" value="100">
    <span class="speed-val" id="anim-speed-val">1.0x</span>
  </div>
</div>

<div id="panel">
  <div class="panel-header">
    <span>Playground</span>
    <a href="/">Editor</a>
  </div>

  <div class="anim-section">
    <div class="anim-section-title">Animations</div>
    <div id="anim-list">
      <div class="anim-item active" data-anim="idle">
        <span class="name">Idle (built-in)</span>
      </div>
    </div>
    <div class="drop-hint">Drag & drop VRM / FBX files here or on the viewport</div>
  </div>

  <div id="presets">
    <button id="save-preset-btn">+ Save</button>
  </div>

  <div class="search">
    <input type="text" id="search" placeholder="Search expressions...">
  </div>

  <div id="expr-list"></div>

  <div id="bottom-bar">
    <span id="status">Loading...</span>
    <button class="reset-btn" id="reset-all">Reset All</button>
  </div>
</div>

<div class="dialog-overlay" id="save-dialog">
  <div class="dialog">
    <h3>Save Expression Preset</h3>
    <input type="text" id="preset-name" placeholder="Preset name...">
    <div class="dialog-actions">
      <button class="cancel" id="save-cancel">Cancel</button>
      <button class="ok" id="save-ok">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import * as VRMModule from '@pixiv/three-vrm';
const { VRMLoaderPlugin, VRMUtils } = VRMModule;

let vrm = null;
const clock = new THREE.Clock();
let mixer = null;
let currentAction = null;
let idleRunning = true;
let animSpeed = 1.0;
const loadedAnims = []; // { name, clip, action }
const exprState = {};

// ---- Three.js ----
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e0e18);
const camera = new THREE.PerspectiveCamera(20, 1, 0.05, 100);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.08;

scene.add(new THREE.DirectionalLight(0xffffff, 1.0)).position.set(0.5, 2, -2);
scene.add(new THREE.DirectionalLight(0xddeeff, 0.5)).position.set(-1, 1, 1);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

function resize() {
  const vp = document.getElementById('viewport');
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  camera.aspect = vp.clientWidth / vp.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ---- Camera ----
function getRef() {
  if (!vrm) return { head:[0,1.5,0], hips:[0,1,0], height:0.5 };
  vrm.scene.updateMatrixWorld(true);
  const head = vrm.humanoid?.getNormalizedBoneNode('head');
  const hips = vrm.humanoid?.getNormalizedBoneNode('hips');
  const hw = new THREE.Vector3(), hpw = new THREE.Vector3();
  if (head) head.getWorldPosition(hw);
  if (hips) hips.getWorldPosition(hpw);
  return { head:[hw.x,hw.y+0.1,hw.z], hips:[hpw.x,hpw.y,hpw.z], height:hw.y-hpw.y+0.3 };
}
function moveTo(pos, target) { camera.position.set(...pos); controls.target.set(...target); controls.update(); }
document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    const r = getRef();
    const views = {
      face: () => moveTo([0,r.head[1],-0.5], r.head),
      bust: () => { const y=(r.head[1]+r.hips[1])/2+r.height*0.2; moveTo([0,y,-r.height*1.2],[0,y,0]); },
      full: () => { const y=(r.head[1]+r.hips[1])/2; moveTo([0,y+r.height*0.1,-r.height*1.8],[0,y,0]); },
    };
    views[btn.dataset.view]?.();
  });
});

// ================ IDLE ANIMATION ================
let idleTime = 0;
let nextBlink = 2;
let blinkPhase = 0;
// Cached bone nodes (resolved once after VRM load)
let idleBones = {};

function initIdlePose() {
  if (!vrm) return;

  // Build a name→bone map by traversing the scene
  const bonesByName = {};
  vrm.scene.traverse(obj => {
    if (obj.isBone || obj.type === 'Bone') bonesByName[obj.name] = obj;
  });
  console.log('All bones:', Object.keys(bonesByName).join(', '));

  // Map VRM humanoid bone names to actual scene bone names
  // VRM 0.x stores bone mappings in the extension
  const humanBoneMap = {};
  if (vrm.humanoid) {
    // Try three-vrm API first
    const tryNames = ['hips','spine','chest','neck','head',
      'leftShoulder','leftUpperArm','leftLowerArm','leftHand',
      'rightShoulder','rightUpperArm','rightLowerArm','rightHand',
      'leftUpperLeg','leftLowerLeg','leftFoot','rightUpperLeg','rightLowerLeg','rightFoot'];
    for (const n of tryNames) {
      const node = vrm.humanoid.getRawBoneNode?.(n) || vrm.humanoid.getNormalizedBoneNode?.(n);
      if (node) humanBoneMap[n] = node;
    }
  }

  // Fallback: match by common bone naming conventions
  if (!humanBoneMap.spine) {
    const namePatterns = {
      spine: /^spine$/i, chest: /^chest$/i, neck: /^neck$/i, head: /^head$/i,
      leftUpperArm: /^(left.?upper.?arm|leftarm|arm_l)$/i,
      rightUpperArm: /^(right.?upper.?arm|rightarm|arm_r)$/i,
      leftLowerArm: /^(left.?lower.?arm|leftforearm|forearm_l)$/i,
      rightLowerArm: /^(right.?lower.?arm|rightforearm|forearm_r)$/i,
    };
    for (const [vrmName, pattern] of Object.entries(namePatterns)) {
      if (humanBoneMap[vrmName]) continue;
      for (const [boneName, bone] of Object.entries(bonesByName)) {
        if (pattern.test(boneName)) { humanBoneMap[vrmName] = bone; break; }
      }
    }
  }

  // Direct name match as last resort
  for (const name of ['Spine','Chest','Neck','Head','LeftUpperArm','RightUpperArm','LeftLowerArm','RightLowerArm']) {
    const vrm_name = name.charAt(0).toLowerCase() + name.slice(1);
    if (!humanBoneMap[vrm_name] && bonesByName[name]) {
      humanBoneMap[vrm_name] = bonesByName[name];
    }
  }

  idleBones = {
    spine: humanBoneMap.spine,
    chest: humanBoneMap.chest,
    head: humanBoneMap.head,
    neck: humanBoneMap.neck,
    leftUpperArm: humanBoneMap.leftUpperArm,
    rightUpperArm: humanBoneMap.rightUpperArm,
    leftLowerArm: humanBoneMap.leftLowerArm,
    rightLowerArm: humanBoneMap.rightLowerArm,
  };

  console.log('Idle bones resolved:', Object.entries(idleBones).map(([k,v]) => `${k}:${v?.name||'NULL'}`).join(', '));

  // Save the default pose rotations so idle animation applies offsets, not absolutes
  idleBones._base = {};
  for (const [name, bone] of Object.entries(idleBones)) {
    if (bone && bone.rotation) {
      idleBones._base[name] = { x: bone.rotation.x, y: bone.rotation.y, z: bone.rotation.z };
    }
  }

  // VRM 0.x defaults to T-pose — relax arms down
  // VRM 1.0 already has a natural rest pose, skip
  const isV0 = !vrm?.meta?.metaVersion; // VRM 1.0 has metaVersion
  if (isV0 && idleBones.leftUpperArm && idleBones.rightUpperArm) {
    idleBones.leftUpperArm.rotation.z += 1.1;
    idleBones.rightUpperArm.rotation.z -= 1.1;
    if (idleBones.leftLowerArm) idleBones.leftLowerArm.rotation.z += 0.3;
    if (idleBones.rightLowerArm) idleBones.rightLowerArm.rotation.z -= 0.3;
    // Update base to include the arm adjustment
    for (const name of ['leftUpperArm', 'rightUpperArm', 'leftLowerArm', 'rightLowerArm']) {
      if (idleBones[name]) {
        idleBones._base[name] = { x: idleBones[name].rotation.x, y: idleBones[name].rotation.y, z: idleBones[name].rotation.z };
      }
    }
  }
}

function updateIdle(dt) {
  if (!vrm || !idleRunning) return;
  idleTime += dt;

  const base = idleBones._base || {};

  // Breathing: small offset from default pose
  if (idleBones.spine && base.spine) {
    idleBones.spine.rotation.x = base.spine.x + Math.sin(idleTime * 1.2) * 0.012;
  }
  if (idleBones.chest && base.chest) {
    idleBones.chest.rotation.x = base.chest.x + Math.sin(idleTime * 1.2 + 0.3) * 0.008;
  }

  // Head sway
  if (idleBones.head && base.head) {
    idleBones.head.rotation.y = base.head.y + Math.sin(idleTime * 0.4) * 0.025;
    idleBones.head.rotation.x = base.head.x + Math.sin(idleTime * 0.3 + 1) * 0.012;
  }
  if (idleBones.neck && base.neck) {
    idleBones.neck.rotation.y = base.neck.y + Math.sin(idleTime * 0.35 + 0.5) * 0.01;
  }

  // Blinking
  if (vrm.expressionManager) {
    blinkPhase -= dt;
    if (blinkPhase <= 0) {
      nextBlink -= dt;
      if (nextBlink <= 0) {
        blinkPhase = 0.15;
        nextBlink = 2 + Math.random() * 4;
      }
      vrm.expressionManager.setValue('blink', 0);
    } else {
      const half = 0.075;
      const t = 0.15 - blinkPhase;
      const v = t < half ? t / half : 1 - (t - half) / half;
      vrm.expressionManager.setValue('blink', v);
    }
  }
}

// ================ MIXAMO RETARGET ================
const MIXAMO_MAP = {
  'mixamorig:Hips': 'hips',
  'mixamorig:Spine': 'spine',
  'mixamorig:Spine1': 'chest',
  'mixamorig:Spine2': 'upperChest',
  'mixamorig:Neck': 'neck',
  'mixamorig:Head': 'head',
  'mixamorig:LeftShoulder': 'leftShoulder',
  'mixamorig:LeftArm': 'leftUpperArm',
  'mixamorig:LeftForeArm': 'leftLowerArm',
  'mixamorig:LeftHand': 'leftHand',
  'mixamorig:RightShoulder': 'rightShoulder',
  'mixamorig:RightArm': 'rightUpperArm',
  'mixamorig:RightForeArm': 'rightLowerArm',
  'mixamorig:RightHand': 'rightHand',
  'mixamorig:LeftUpLeg': 'leftUpperLeg',
  'mixamorig:LeftLeg': 'leftLowerLeg',
  'mixamorig:LeftFoot': 'leftFoot',
  'mixamorig:LeftToeBase': 'leftToes',
  'mixamorig:RightUpLeg': 'rightUpperLeg',
  'mixamorig:RightLeg': 'rightLowerLeg',
  'mixamorig:RightFoot': 'rightFoot',
  'mixamorig:RightToeBase': 'rightToes',
  // Fingers
  'mixamorig:LeftHandThumb1': 'leftThumbMetacarpal',
  'mixamorig:LeftHandThumb2': 'leftThumbProximal',
  'mixamorig:LeftHandThumb3': 'leftThumbDistal',
  'mixamorig:LeftHandIndex1': 'leftIndexProximal',
  'mixamorig:LeftHandIndex2': 'leftIndexIntermediate',
  'mixamorig:LeftHandIndex3': 'leftIndexDistal',
  'mixamorig:LeftHandMiddle1': 'leftMiddleProximal',
  'mixamorig:LeftHandMiddle2': 'leftMiddleIntermediate',
  'mixamorig:LeftHandMiddle3': 'leftMiddleDistal',
  'mixamorig:LeftHandRing1': 'leftRingProximal',
  'mixamorig:LeftHandRing2': 'leftRingIntermediate',
  'mixamorig:LeftHandRing3': 'leftRingDistal',
  'mixamorig:LeftHandPinky1': 'leftLittleProximal',
  'mixamorig:LeftHandPinky2': 'leftLittleIntermediate',
  'mixamorig:LeftHandPinky3': 'leftLittleDistal',
  'mixamorig:RightHandThumb1': 'rightThumbMetacarpal',
  'mixamorig:RightHandThumb2': 'rightThumbProximal',
  'mixamorig:RightHandThumb3': 'rightThumbDistal',
  'mixamorig:RightHandIndex1': 'rightIndexProximal',
  'mixamorig:RightHandIndex2': 'rightIndexIntermediate',
  'mixamorig:RightHandIndex3': 'rightIndexDistal',
  'mixamorig:RightHandMiddle1': 'rightMiddleProximal',
  'mixamorig:RightHandMiddle2': 'rightMiddleIntermediate',
  'mixamorig:RightHandMiddle3': 'rightMiddleDistal',
  'mixamorig:RightHandRing1': 'rightRingProximal',
  'mixamorig:RightHandRing2': 'rightRingIntermediate',
  'mixamorig:RightHandRing3': 'rightRingDistal',
  'mixamorig:RightHandPinky1': 'rightLittleProximal',
  'mixamorig:RightHandPinky2': 'rightLittleIntermediate',
  'mixamorig:RightHandPinky3': 'rightLittleDistal',
};

function retargetClip(clip) {
  const newTracks = [];
  for (const track of clip.tracks) {
    // Track name format: "boneName.property"
    const dotIdx = track.name.indexOf('.');
    if (dotIdx < 0) continue;
    const boneName = track.name.substring(0, dotIdx);
    const property = track.name.substring(dotIdx);

    // Map Mixamo bone name to VRM bone name
    const vrmBoneName = MIXAMO_MAP[boneName];
    if (!vrmBoneName) continue;

    // Get the raw bone node for this VRM bone
    const boneNode = vrm.humanoid?.getRawBoneNode(vrmBoneName);
    if (!boneNode) continue;

    // Skip position tracks except for hips (root motion)
    if (property.includes('position') && vrmBoneName !== 'hips') continue;
    // Skip scale tracks
    if (property.includes('scale')) continue;

    const newTrack = track.clone();
    newTrack.name = boneNode.name + property;
    newTracks.push(newTrack);
  }
  return new THREE.AnimationClip(clip.name || 'Retargeted', clip.duration, newTracks);
}

// ================ ANIMATION MANAGEMENT ================

function playAnimation(anim) {
  if (!mixer) return;

  // Stop current
  if (currentAction) {
    currentAction.fadeOut(0.3);
  }

  if (anim === 'idle') {
    idleRunning = true;
    currentAction = null;
    document.getElementById('anim-name').textContent = 'Idle';
    // Reset pose
    vrm.humanoid?.resetNormalizedPose();
  } else {
    idleRunning = false;
    // Reset idle pose modifications
    const spine = vrm.humanoid?.getRawBoneNode('spine');
    const chest = vrm.humanoid?.getRawBoneNode('chest');
    const head = vrm.humanoid?.getRawBoneNode('head');
    if (spine) spine.rotation.x = 0;
    if (chest) chest.rotation.x = 0;
    if (head) { head.rotation.y = 0; head.rotation.x = 0; }

    const action = mixer.clipAction(anim.clip);
    action.reset();
    action.fadeIn(0.3);
    action.play();
    currentAction = action;
    document.getElementById('anim-name').textContent = anim.name;
  }

  // Update active state in list
  document.querySelectorAll('.anim-item').forEach(item => {
    const isActive = anim === 'idle' ? item.dataset.anim === 'idle' : item.dataset.anim === anim.name;
    item.classList.toggle('active', isActive);
  });
}

// ---- FBX loading ----
const fbxLoader = new FBXLoader();

function loadFBXFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const fbx = fbxLoader.parse(e.target.result, '');
      const clips = fbx.animations;
      if (!clips || clips.length === 0) {
        showToast('No animations found in FBX');
        return;
      }

      for (const clip of clips) {
        const retargeted = retargetClip(clip);
        if (retargeted.tracks.length === 0) {
          showToast('Could not retarget: no matching bones');
          continue;
        }
        const name = file.name.replace(/\.fbx$/i, '') + (clips.length > 1 ? ` (${clip.name})` : '');
        const anim = { name, clip: retargeted };
        loadedAnims.push(anim);
        addAnimToList(anim);
        playAnimation(anim);
        showToast(`Loaded: ${name}`);
      }
    } catch (err) {
      console.error(err);
      showToast('Failed to load FBX');
    }
  };
  reader.readAsArrayBuffer(file);
}

function addAnimToList(anim) {
  const list = document.getElementById('anim-list');
  const item = document.createElement('div');
  item.className = 'anim-item';
  item.dataset.anim = anim.name;
  item.innerHTML = `
    <span class="name">${anim.name}</span>
    <span class="dur">${anim.clip.duration.toFixed(1)}s</span>
    <span class="del">x</span>
  `;
  item.addEventListener('click', (e) => {
    if (e.target.classList.contains('del')) {
      const idx = loadedAnims.indexOf(anim);
      if (idx >= 0) loadedAnims.splice(idx, 1);
      if (currentAction?.getClip() === anim.clip) playAnimation('idle');
      item.remove();
      return;
    }
    playAnimation(anim);
  });
  list.appendChild(item);
}

// Idle click handler
document.querySelector('[data-anim="idle"]').addEventListener('click', () => playAnimation('idle'));

// ---- Drag & drop ----
const viewport = document.getElementById('viewport');
const dropOverlay = document.getElementById('drop-overlay');

['dragenter', 'dragover'].forEach(ev => {
  viewport.addEventListener(ev, (e) => { e.preventDefault(); dropOverlay.classList.add('show'); });
  document.getElementById('panel').addEventListener(ev, (e) => { e.preventDefault(); dropOverlay.classList.add('show'); });
});
['dragleave', 'drop'].forEach(ev => {
  dropOverlay.addEventListener(ev, () => dropOverlay.classList.remove('show'));
});

viewport.addEventListener('drop', handleDrop);
document.getElementById('panel').addEventListener('drop', handleDrop);

function handleDrop(e) {
  e.preventDefault();
  dropOverlay.classList.remove('show');
  const files = e.dataTransfer?.files;
  if (!files) return;
  for (const file of files) {
    const name = file.name.toLowerCase();
    if (name.endsWith('.fbx')) {
      loadFBXFile(file);
    } else if (name.endsWith('.vrm')) {
      loadVRMFromFile(file);
    } else {
      showToast(`Unsupported: ${file.name}`);
    }
  }
}

function loadVRMFromFile(file) {
  const overlay = document.getElementById('loading-overlay');
  overlay.style.display = 'flex';
  overlay.classList.remove('hidden');
  document.getElementById('loading-pct').textContent = '';
  document.getElementById('loading-text').textContent = 'Loading dropped VRM...';

  const url = URL.createObjectURL(file);
  // Remove old model
  if (vrm) { VRMUtils.deepDispose(vrm.scene); scene.remove(vrm.scene); }
  if (mixer) { mixer.stopAllAction(); mixer = null; }
  currentAction = null;
  idleRunning = true;

  loader.load(url, (gltf) => {
    vrm = gltf.userData.vrm;
    VRMUtils.rotateVRM0(vrm);
    scene.add(vrm.scene);
    vrm.scene.updateMatrixWorld(true);
    URL.revokeObjectURL(url);

    mixer = new THREE.AnimationMixer(vrm.scene);
    initIdlePose();

    const r = getRef();
    const y = (r.head[1]+r.hips[1])/2 + r.height*0.2;
    moveTo([0, y, -r.height*1.2], [0, y, 0]);

    buildExprList();
    setStatus(`Loaded: ${file.name}`);
    overlay.classList.add('hidden');
    setTimeout(() => overlay.style.display = 'none', 500);
    showToast(`Loaded: ${file.name}`);
  }, null, (err) => {
    showToast(`Failed: ${err.message}`);
    overlay.classList.add('hidden');
  });
}

// ---- Anim controls ----

document.getElementById('anim-play').addEventListener('click', () => {

// ================ EXPRESSIONS (same as before) ================
const CATEGORIES = {
  'Emotion':   /^(happy|angry|sad|relaxed|surprised|joy|sorrow|fun|neutral)/i,
  'Eyes':      /^(blink|lookUp|lookDown|lookLeft|lookRight|eye_|Eye_|LowerEyelid|eyelash_|eyelid_|highlight_)/i,
  'Mouth':     /^(aa|ih|ou|ee|oh|mouth_|A$|I$|U$|E$|O$|bero_|yaeba)/i,
  'Eyebrows':  /^eyebrow_/i,
  'Lip Sync':  /^vrc\./i,
  'Effects':   /^Option_/i,
};
function categorize(name) {
  for (const [cat, re] of Object.entries(CATEGORIES)) { if (re.test(name)) return cat; }
  return 'Other';
}

function buildExprList() {
  const container = document.getElementById('expr-list'); container.innerHTML = '';
  if (!vrm?.expressionManager) return;
  const items = [];
  for (const expr of vrm.expressionManager.expressions) items.push({ name:expr.expressionName, type:'vrm' });
  vrm.scene.traverse(obj => {
    if ((obj.isMesh||obj.isSkinnedMesh) && obj.morphTargetDictionary) {
      for (const [name,idx] of Object.entries(obj.morphTargetDictionary)) {
        if (name==='Basis' || items.some(i=>i.name===name)) continue;
        items.push({ name, type:'shapekey', mesh:obj, index:idx });
      }
    }
  });
  const grouped = {};
  for (const item of items) {
    const cat = item.type==='vrm' ? 'VRM Expression' : categorize(item.name);
    (grouped[cat] ??= []).push(item);
  }
  const order = ['VRM Expression','Emotion','Eyes','Mouth','Eyebrows','Lip Sync','Effects','Other'];
  const sorted = Object.keys(grouped).sort((a,b) => {
    const ai=order.indexOf(a),bi=order.indexOf(b);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  for (const cat of sorted) {
    const items = grouped[cat];
    const section = document.createElement('div');
    section.className = 'cat' + (cat!=='VRM Expression'?' collapsed':'');
    const head = document.createElement('div'); head.className = 'cat-head';
    head.innerHTML = `<span class="cat-arrow">&#9660;</span><span>${cat}</span><span class="cat-count">${items.length}</span>`;
    head.addEventListener('click', () => section.classList.toggle('collapsed'));
    const body = document.createElement('div'); body.className = 'cat-body';
    for (const item of items) {
      const row = document.createElement('div'); row.className='expr-row'; row.dataset.name=item.name.toLowerCase();
      const label = document.createElement('label'); label.textContent=item.name;
      const slider = document.createElement('input'); slider.type='range'; slider.min='0'; slider.max='100'; slider.value='0';
      const val = document.createElement('span'); val.className='val'; val.textContent='0';
      slider.addEventListener('input', () => {
        const v=parseInt(slider.value)/100; val.textContent=slider.value;
        row.classList.toggle('active',v>0);
        if (item.type==='vrm') vrm.expressionManager.setValue(item.name,v);
        else item.mesh.morphTargetInfluences[item.index]=v;
        exprState[item.name]=v; if(v===0) delete exprState[item.name];
      });
      row.append(label,slider,val); body.appendChild(row);
    }
    section.append(head,body); container.appendChild(section);
  }
}

document.getElementById('search').addEventListener('input',(e)=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.expr-row').forEach(r=>r.style.display=r.dataset.name.includes(q)?'':'none');
  document.querySelectorAll('.cat').forEach(cat=>{
    const vis=cat.querySelectorAll('.expr-row:not([style*="display: none"])').length;
    cat.style.display=vis?'':'none'; if(q&&vis) cat.classList.remove('collapsed');
  });
});

document.getElementById('reset-all').addEventListener('click',()=>{
  if(!vrm) return;
  for(const e of vrm.expressionManager.expressions) vrm.expressionManager.setValue(e.expressionName,0);
  vrm.scene.traverse(o=>{if(o.morphTargetInfluences)o.morphTargetInfluences.fill(0)});
  document.querySelectorAll('.expr-row input[type="range"]').forEach(s=>{s.value='0';s.nextElementSibling.textContent='0'});
  document.querySelectorAll('.expr-row').forEach(r=>r.classList.remove('active'));
  Object.keys(exprState).forEach(k=>delete exprState[k]);
});

// ---- Presets ----
async function loadPresets() {
  const presets = await api('get_presets');
  const container = document.getElementById('presets');
  container.querySelectorAll('.preset-chip').forEach(c=>c.remove());
  for (const preset of presets) {
    const chip = document.createElement('div'); chip.className='preset-chip';
    chip.innerHTML=`<span>${preset.name}</span><span class="del">x</span>`;
    chip.addEventListener('click',(e)=>{
      if(e.target.classList.contains('del'))return;
      applyPreset(preset);
      container.querySelectorAll('.preset-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
    });
    chip.querySelector('.del').addEventListener('click',async()=>{
      await api('delete_preset', { name: preset.name });
      loadPresets(); showToast('Deleted');
    });
    container.insertBefore(chip,container.lastElementChild);
  }
}
function applyPreset(preset) {
  document.getElementById('reset-all').click();
  for (const [name,value] of Object.entries(preset.weights||{})) {
    exprState[name]=value;
    document.querySelectorAll('.expr-row').forEach(row=>{
      if(row.querySelector('label')?.textContent===name){
        const s=row.querySelector('input[type="range"]');
        s.value=String(Math.round(value*100)); s.nextElementSibling.textContent=String(Math.round(value*100));
        s.dispatchEvent(new Event('input'));
      }
    });
  }
}
document.getElementById('save-preset-btn').addEventListener('click',()=>{
  if(!Object.keys(exprState).length){showToast('No expressions active');return;}
  document.getElementById('preset-name').value='';
  document.getElementById('save-dialog').classList.add('show');
  document.getElementById('preset-name').focus();
});
document.getElementById('save-cancel').addEventListener('click',()=>document.getElementById('save-dialog').classList.remove('show'));
document.getElementById('save-ok').addEventListener('click',async()=>{
  const name=document.getElementById('preset-name').value.trim(); if(!name)return;
  await api('save_preset', { preset: { name, weights: { ...exprState } } });
  document.getElementById('save-dialog').classList.remove('show');
  loadPresets(); showToast(`Saved: ${name}`);
});
document.getElementById('preset-name').addEventListener('keydown',(e)=>{
  if(e.key==='Enter') document.getElementById('save-ok').click();
  if(e.key==='Escape') document.getElementById('save-cancel').click();
});

// ================ TAURI / BROWSER BRIDGE ================
const IS_TAURI = !!window.__TAURI__;
const invoke = IS_TAURI ? window.__TAURI__.core.invoke : null;

// Unified API calls — Tauri invoke or HTTP fetch
async function api(cmd, args = {}) {
  if (IS_TAURI) {
    return await invoke(cmd, args);
  }
  // Map command names to HTTP endpoints
  const routes = {
    get_presets: ['/api/presets', 'GET'],
    save_preset: ['/api/presets', 'POST', args.preset],
    delete_preset: [`/api/presets/${encodeURIComponent(args.name)}`, 'DELETE'],
    get_meta: ['/api/meta', 'GET'],
    set_meta: ['/api/meta', 'POST', args.data],
    get_summary: ['/api/summary', 'GET'],
  };
  const route = routes[cmd];
  if (!route) throw new Error(`Unknown API command: ${cmd}`);
  const [url, method, body] = route;
  const opts = { method };
  if (body) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(url, opts);
  return await resp.json();
}

// ================ LOAD VRM ================
const loader = new GLTFLoader();
loader.register((parser) => new VRMLoaderPlugin(parser));

function loadVRM() {
  setStatus('Loading...');
  const overlay = document.getElementById('loading-overlay');
  const pctEl = document.getElementById('loading-pct');
  const textEl = document.getElementById('loading-text');

  textEl.textContent = IS_TAURI ? 'Loading from disk...' : 'Loading...';
  pctEl.textContent = '';

  const vrmUrlPromise = IS_TAURI
    ? invoke('get_vrm_asset_url').then(path => window.__TAURI__.core.convertFileSrc(path))
    : Promise.resolve('/api/vrm');

  vrmUrlPromise.then(vrmUrl => {
    console.log('Loading VRM from:', vrmUrl);
    loader.load(vrmUrl, (gltf) => {
      console.log('GLTF loaded. has vrm:', !!gltf.userData.vrm, 'scene children:', gltf.scene?.children?.length);
      vrm = gltf.userData.vrm;
      if (!vrm) { textEl.textContent = 'VRM parse failed'; return; }

      VRMUtils.rotateVRM0(vrm);
      scene.add(vrm.scene);
      vrm.scene.updateMatrixWorld(true);
      console.log('Scene children after add:', scene.children.length);

      mixer = new THREE.AnimationMixer(vrm.scene);
      initIdlePose();

      const r = getRef();
      const y = (r.head[1]+r.hips[1])/2 + r.height*0.2;
      moveTo([0, y, -r.height*1.2], [0, y, 0]);
      console.log('Camera:', camera.position.x.toFixed(2), camera.position.y.toFixed(2), camera.position.z.toFixed(2));
      console.log('Target:', controls.target.x.toFixed(2), controls.target.y.toFixed(2), controls.target.z.toFixed(2));

      buildExprList();
      loadPresets();
      setStatus('Ready — drop FBX to animate');

      // Force resize + render (Tauri WebView may init with 0-size canvas)
      resize();
      renderer.render(scene, camera);
      console.log('Canvas:', canvas.width, 'x', canvas.height, 'GL:', renderer.getContext().drawingBufferWidth, 'x', renderer.getContext().drawingBufferHeight);

      overlay.classList.add('hidden');
      setTimeout(() => overlay.style.display = 'none', 500);
    }, (p) => {
      if (p.total) {
        const pct = Math.round(p.loaded / p.total * 100);
        pctEl.textContent = `${pct}%`;
        textEl.textContent = pct < 100 ? 'Loading...' : 'Building 3D scene...';
      }
    }, (err) => {
      console.error('VRM load error:', err);
      textEl.textContent = 'Error loading VRM';
      pctEl.textContent = '';
    });
  });
}

// ---- Render ----
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (vrm) vrm.update(dt);
  if (!animPaused) {
    if (mixer) mixer.update(dt * animSpeed);
    // Idle runs AFTER vrm.update so bone changes aren't overwritten
    if (idleRunning) updateIdle(dt * animSpeed);
  }
  controls.update();
  renderer.render(scene, camera);
}
loadVRM();
animate();
