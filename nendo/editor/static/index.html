<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nendo editor</title>
<style>
:root {
  --bg: #111118;
  --panel: #1a1a28;
  --panel2: #222235;
  --border: #2a2a40;
  --text: #e8e8f0;
  --dim: #7878a0;
  --accent: #00ff99;
  --accent-dim: rgba(0,255,153,0.15);
  --accent2: #4cc9f0;
  --warn: #ff6b6b;
  --input-bg: #14142a;
  --hover: #2a2a50;
  --radius: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  overflow: hidden;
  height: 100vh;
  display: flex;
}

#viewport { flex: 1; position: relative; }
canvas { display: block; width: 100%; height: 100%; }
#viewport-overlay {
  position: absolute; top: 12px; left: 12px;
  display: flex; gap: 6px;
}
.view-btn {
  padding: 5px 10px;
  background: rgba(20,20,40,0.8);
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 11px;
  backdrop-filter: blur(8px);
}
.view-btn:hover { color: var(--text); border-color: var(--accent); }

#recolor-hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,255,153,0.9); color: #000; padding: 8px 20px;
  border-radius: var(--radius); font-weight: 600; font-size: 13px;
  display: none; pointer-events: none;
}
#viewport.recolor-mode { cursor: crosshair; }
#viewport.recolor-mode #recolor-hint { display: block; }

#panel {
  width: 380px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 10px 16px; font-size: 14px; font-weight: 600;
  border-bottom: 1px solid var(--border); color: var(--accent);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-header .save-btn {
  padding: 4px 14px; background: var(--accent); color: #000;
  border: none; border-radius: var(--radius); cursor: pointer;
  font-size: 12px; font-weight: 600;
}
.panel-header .save-btn:hover { opacity: 0.85; }

.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--panel2); }
.tab {
  flex: 1; padding: 10px 4px; text-align: center; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--dim);
  font-size: 12px; font-weight: 500; transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.tab-content { display: none; flex: 1; overflow-y: auto; }
.tab-content.active { display: block; }
.tab-content::-webkit-scrollbar { width: 5px; }
.tab-content::-webkit-scrollbar-track { background: transparent; }
.tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.part-item {
  display: flex; align-items: center; padding: 8px 16px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background 0.1s; gap: 10px;
}
.part-item:hover { background: var(--hover); }
.part-item.selected { background: var(--accent-dim); }
.part-toggle {
  width: 18px; height: 18px; border: 1.5px solid var(--dim);
  border-radius: 3px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; cursor: pointer;
  font-size: 12px; color: var(--accent); transition: all 0.1s;
}
.part-toggle.on { border-color: var(--accent); background: var(--accent-dim); }
.part-toggle.on::after { content: "\2713"; }
.part-name { flex: 1; font-size: 13px; }
.part-info { font-size: 11px; color: var(--dim); }

.category { border-bottom: 1px solid var(--border); }
.category-header {
  display: flex; align-items: center; padding: 10px 16px;
  cursor: pointer; user-select: none; gap: 8px;
  font-weight: 500; font-size: 13px; color: var(--accent2);
  background: var(--panel2);
}
.category-header:hover { background: var(--hover); }
.category-arrow { font-size: 10px; transition: transform 0.15s; color: var(--dim); }
.category.collapsed .category-arrow { transform: rotate(-90deg); }
.category.collapsed .category-body { display: none; }
.category-body { padding: 6px 0; }
.category-count { font-size: 11px; color: var(--dim); margin-left: auto; }

.slider-row {
  display: flex; align-items: center; padding: 3px 16px 3px 24px; gap: 8px;
}
.slider-row label {
  min-width: 110px; font-size: 11px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; color: var(--dim); flex-shrink: 0;
}
.slider-row label:hover { color: var(--text); }
.slider-row input[type="range"] { flex: 1; accent-color: var(--accent); height: 3px; }
.slider-row .val {
  min-width: 30px; text-align: right; font-size: 11px;
  font-variant-numeric: tabular-nums; color: var(--accent);
}
.slider-row.modified label { color: var(--accent); }

.color-row {
  display: flex; align-items: center; padding: 6px 16px 6px 24px; gap: 10px;
}
.color-row label { min-width: 80px; font-size: 12px; color: var(--dim); }
.color-swatch {
  width: 28px; height: 28px; border-radius: 4px;
  border: 2px solid var(--border); cursor: pointer;
  position: relative; overflow: hidden;
}
.color-swatch input[type="color"] {
  position: absolute; inset: -4px; width: 36px; height: 36px;
  border: none; cursor: pointer; opacity: 0;
}
.color-hex { font-size: 11px; color: var(--dim); font-family: monospace; }

.search-box { padding: 8px 16px; border-bottom: 1px solid var(--border); }
.search-box input {
  width: 100%; background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); padding: 7px 10px; border-radius: var(--radius); font-size: 12px;
}
.search-box input:focus { outline: none; border-color: var(--accent2); }

.field { display: flex; align-items: center; padding: 5px 16px; gap: 10px; }
.field label { min-width: 100px; font-size: 12px; color: var(--dim); }
.field input[type="text"] {
  flex: 1; background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 12px;
}
.field input:focus { outline: none; border-color: var(--accent2); }

/* Recolor panel */
.recolor-panel { padding: 12px 16px; }
.recolor-panel .instruction {
  padding: 10px; background: var(--panel2); border-radius: var(--radius);
  color: var(--dim); font-size: 12px; line-height: 1.5; margin-bottom: 10px;
}
.sampled-color-preview {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.sampled-swatch {
  width: 40px; height: 40px; border-radius: var(--radius);
  border: 2px solid var(--border);
}
.recolor-controls { display: none; }
.recolor-controls.active { display: block; }
.recolor-actions {
  display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.recolor-actions button {
  flex: 1; padding: 8px; border-radius: var(--radius); cursor: pointer;
  font-size: 12px; font-weight: 600; border: 1px solid var(--border);
}
.recolor-actions .apply-btn {
  background: var(--accent); color: #000; border-color: var(--accent);
}
.recolor-actions .reset-btn {
  background: var(--input-bg); color: var(--text);
}

/* Texture preview in recolor */
.texture-preview {
  margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px;
}
.texture-preview canvas {
  width: 100%; border-radius: var(--radius);
  border: 1px solid var(--border);
}
.texture-preview .tex-name { font-size: 11px; color: var(--dim); margin-bottom: 6px; }

#status {
  padding: 6px 16px; font-size: 11px; color: var(--dim);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: #000; padding: 8px 24px;
  border-radius: var(--radius); font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.25s; z-index: 100; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="viewport">
  <canvas id="canvas"></canvas>
  <div id="viewport-overlay">
    <button class="view-btn" data-view="full">Full</button>
    <button class="view-btn" data-view="face">Face</button>
    <button class="view-btn" data-view="front">Front</button>
    <button class="view-btn" data-view="side">Side</button>
    <button class="view-btn" data-view="back">Back</button>
  </div>
  <div id="recolor-hint">Click on the model to pick a color</div>
</div>

<div id="panel">
  <div class="panel-header">
    <span>nendo editor</span>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="/playground" style="color:var(--dim);font-size:12px;text-decoration:none">Playground</a>
      <button class="save-btn" id="save-all">Save</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" data-tab="parts">Parts</div>
    <div class="tab" data-tab="shape">Shape</div>
    <div class="tab" data-tab="face">Face</div>
    <div class="tab active" data-tab="recolor">Recolor</div>
    <div class="tab" data-tab="material">Material</div>
    <div class="tab" data-tab="meta">Meta</div>
  </div>

  <div id="tab-parts" class="tab-content"><div id="parts-list"></div></div>
  <div id="tab-shape" class="tab-content">
    <div class="search-box"><input type="text" id="shape-search" placeholder="Search body shape keys..."></div>
    <div id="shape-categories"></div>
  </div>
  <div id="tab-face" class="tab-content">
    <div class="search-box"><input type="text" id="face-search" placeholder="Search face shape keys..."></div>
    <div id="face-categories"></div>
  </div>

  <!-- Recolor tab -->
  <div id="tab-recolor" class="tab-content active">
    <div class="recolor-panel">
      <div class="instruction">
        Click on the 3D model to pick a part, then choose a new color.
      </div>

      <!-- Color: sampled → target -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="text-align:center">
          <div style="font-size:10px;color:var(--dim);margin-bottom:4px">Current</div>
          <div class="sampled-swatch" id="sampled-swatch" style="width:48px;height:48px;border-radius:8px;border:2px solid var(--border)"></div>
        </div>
        <div style="font-size:18px;color:var(--dim)">→</div>
        <div style="text-align:center">
          <div style="font-size:10px;color:var(--dim);margin-bottom:4px">New</div>
          <div id="target-swatch" style="width:48px;height:48px;border-radius:8px;border:2px solid var(--border);position:relative;cursor:pointer;background:#888">
            <input type="color" id="rc-color-picker" value="#888888" style="position:absolute;inset:-4px;width:56px;height:56px;border:none;cursor:pointer;opacity:0">
          </div>
        </div>
        <div style="flex:1">
          <div id="sampled-label" style="font-size:12px;color:var(--dim)">Click model to pick</div>
          <div id="sampled-hex" style="font-size:11px;font-family:monospace;color:var(--accent)"></div>
        </div>
      </div>

      <div class="recolor-controls" id="recolor-controls">
        <!-- Fine-tune sliders (hidden by default, toggle to show) -->
        <div style="margin-bottom:8px">
          <button class="view-btn" id="toggle-sliders" style="width:100%;text-align:center;padding:6px">Fine-tune sliders</button>
        </div>
        <div id="fine-tune-sliders" style="display:none">
          <div class="slider-row">
            <label>Hue Shift</label>
            <input type="range" id="rc-hue" min="-180" max="180" value="0">
            <span class="val" id="rc-hue-val">0</span>
          </div>
          <div class="slider-row">
            <label>Saturation</label>
            <input type="range" id="rc-sat" min="-100" max="100" value="0">
            <span class="val" id="rc-sat-val">0</span>
          </div>
          <div class="slider-row">
            <label>Brightness</label>
            <input type="range" id="rc-bri" min="-100" max="100" value="0">
            <span class="val" id="rc-bri-val">0</span>
          </div>
        </div>
        <div class="slider-row">
          <label>Tolerance</label>
          <input type="range" id="rc-tol" min="5" max="80" value="30">
          <span class="val" id="rc-tol-val">30</span>
        </div>
        <div class="recolor-actions">
          <button class="reset-btn" id="rc-reset">Reset</button>
          <button class="apply-btn" id="rc-apply">Apply & Save</button>
        </div>
      </div>

      <div class="texture-preview" id="texture-preview">
        <div class="tex-name" id="tex-preview-name"></div>
        <canvas id="tex-preview-canvas"></canvas>
      </div>
    </div>
  </div>

  <div id="tab-material" class="tab-content"><div id="material-list"></div></div>
  <div id="tab-meta" class="tab-content"><div style="padding:10px 0"><div id="meta-fields"></div></div></div>

  <div id="status">Loading...</div>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as VRMModule from '@pixiv/three-vrm';

const { VRMLoaderPlugin, VRMUtils } = VRMModule;

// ---- State ----
let vrm = null;
let gltfData = null;
const clock = new THREE.Clock();
const modifiedWeights = {};
const modifiedMaterials = {};

// Recolor state
let recolorMode = true;
let sampledColor = null;
let sampledTexInfo = null;  // { mesh, material, texIndex, imageIndex }
let originalTexData = null; // ImageData of original texture
const recolorCanvas = document.createElement('canvas');
const recolorCtx = recolorCanvas.getContext('2d', { willReadFrequently: true });

// ---- Three.js ----
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111118);

const camera = new THREE.PerspectiveCamera(28, 1, 0.05, 100);
camera.position.set(0, 1.3, -2.5);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(1, 3, -3);
scene.add(dirLight);
scene.add(new THREE.DirectionalLight(0xaabbff, 0.4)).position.set(-2, 1, 2);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const grid = new THREE.GridHelper(10, 20, 0x222240, 0x1a1a30);
scene.add(grid);

const raycaster = new THREE.Raycaster();

function resize() {
  const vp = document.getElementById('viewport');
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  camera.aspect = vp.clientWidth / vp.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ---- Helpers ----
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ---- Color conversion ----
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  return [h * 360, s * 100, l * 100];
}

function hslToRgb(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;
  if (h < 60) { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; b = x; }
  else if (h < 240) { g = x; b = c; }
  else if (h < 300) { r = x; b = c; }
  else { r = c; b = x; }
  return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}

function hueDist(h1, h2) {
  const d = Math.abs(h1 - h2);
  return Math.min(d, 360 - d);
}

// ---- Camera ----
function moveCameraTo(pos, target) {
  camera.position.set(...pos); controls.target.set(...target); controls.update();
}
function getModelCenter() {
  if (!vrm) return { center: [0,1,0], height: 1.6, headY: 1.5 };
  vrm.scene.updateMatrixWorld(true);
  const hips = vrm.humanoid?.getNormalizedBoneNode('hips');
  const head = vrm.humanoid?.getNormalizedBoneNode('head');
  if (hips && head) {
    const hw = new THREE.Vector3(); hips.getWorldPosition(hw);
    const hdw = new THREE.Vector3(); head.getWorldPosition(hdw);
    const cx = (hw.x + hdw.x) / 2, cy = (hw.y + hdw.y) / 2, cz = (hw.z + hdw.z) / 2;
    return { center: [cx, cy, cz], height: hdw.y - hw.y + 0.3, headY: hdw.y + 0.15 };
  }
  const box = new THREE.Box3().setFromObject(vrm.scene);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  return { center: [c.x,c.y,c.z], height: s.y, headY: c.y + s.y * 0.35 };
}
document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    const { center: c, height: h, headY } = getModelCenter();
    const views = {
      full:  () => moveCameraTo([0, c[1]+h*0.1, -h*1.5], c),
      face:  () => moveCameraTo([0, headY, -0.55], [0, headY, 0]),
      front: () => moveCameraTo([0, c[1], -h*1.2], c),
      side:  () => moveCameraTo([-h*1.2, c[1], 0], c),
      back:  () => moveCameraTo([0, c[1], h*1.2], c),
    };
    views[btn.dataset.view]?.();
  });
});

// ---- Tabs ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    recolorMode = tab.dataset.tab === 'recolor';
    document.getElementById('viewport').classList.toggle('recolor-mode', recolorMode);
  });
});
// Init recolor mode active
document.getElementById('viewport').classList.add('recolor-mode');

// ================ RECOLOR TOOL ================

// Click on 3D model -> sample color
// Distinguish click from drag so orbit doesn't eat recolor picks
let pointerDownPos = null;
canvas.addEventListener('pointerdown', (e) => { pointerDownPos = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('pointerup', (e) => {
  if (!recolorMode || !vrm || !pointerDownPos) return;
  const dx = e.clientX - pointerDownPos.x, dy = e.clientY - pointerDownPos.y;
  if (dx * dx + dy * dy > 25) return; // dragged — skip

  const rect = canvas.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(vrm.scene, true);
  if (!hits.length) return;

  const hit = hits[0];
  if (!hit.uv) return;

  const mesh = hit.object;
  // Pick the correct material for multi-material meshes (e.g. Body has Face + Face_effect)
  let mat;
  if (Array.isArray(mesh.material) && hit.face) {
    mat = mesh.material[hit.face.materialIndex] || mesh.material[0];
  } else {
    mat = Array.isArray(mesh.material) ? mesh.material[0] : mesh.material;
  }
  if (!mat?.map?.image) {
    // Try other materials on this mesh if the hit one has no texture
    const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
    const alt = mats.find(m => m?.map?.image);
    if (!alt) return;
    mat = alt;
  }
  if (!mat.map?.image) return;

  // Sample color from texture at UV
  const tex = mat.map;
  const img = tex.image;
  recolorCanvas.width = img.width;
  recolorCanvas.height = img.height;
  recolorCtx.drawImage(img, 0, 0);

  const px = Math.floor(hit.uv.x * img.width);
  const py = Math.floor((1 - hit.uv.y) * img.height);
  const pixel = recolorCtx.getImageData(px, py, 1, 1).data;

  // Store original texture data (only needed for saving)
  originalTexData = recolorCtx.getImageData(0, 0, img.width, img.height);

  // Init GPU recolor pipeline
  initRecolorGPU(tex);

  // Find texture/image index
  const texIndex = findTextureIndex(mat);

  sampledColor = { r: pixel[0], g: pixel[1], b: pixel[2] };
  sampledTexInfo = { mesh, material: mat, texture: tex, texIndex, image: img };

  // Set sampled color HSL on GPU uniform
  const [sH, sS, sL] = rgbToHsl(sampledColor.r, sampledColor.g, sampledColor.b);
  if (recolorMat) {
    recolorMat.uniforms.uSampledHSL.value.set(sH / 360, sS / 100, sL / 100);
  }

  // Update UI
  const hex = `#${pixel[0].toString(16).padStart(2,'0')}${pixel[1].toString(16).padStart(2,'0')}${pixel[2].toString(16).padStart(2,'0')}`;

});

function findTextureIndex(mat) {
  if (!gltfData?.parser?.json?.materials) return -1;
  const gltfMats = gltfData.parser.json.materials;
  for (let i = 0; i < gltfMats.length; i++) {
    if (gltfMats[i].name === mat.name) {
      return gltfMats[i]?.pbrMetallicRoughness?.baseColorTexture?.index ?? -1;
    }
  }
  return -1;
}

// ---- GPU Recolor: all pixel work runs on the GPU via a fragment shader ----
let recolorRT = null;       // WebGLRenderTarget
let recolorMat = null;      // ShaderMaterial
let recolorScene2 = null;   // Offscreen scene for the recolor pass
let recolorCam2 = null;     // Ortho camera

const RECOLOR_VS = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 1.0);
}`;

const RECOLOR_FS = `
precision highp float;
uniform sampler2D tOriginal;
uniform vec3 uSampledHSL;  // h in [0,1], s in [0,1], l in [0,1]
uniform float uHueShift;   // [-0.5, 0.5]
uniform float uSatShift;   // [-1, 1]
uniform float uBriShift;   // [-1, 1]
uniform float uTolerance;  // [0, 1] (normalized from 0-80)
varying vec2 vUv;

vec3 rgbToHsl(vec3 c) {
  float mx = max(c.r, max(c.g, c.b));
  float mn = min(c.r, min(c.g, c.b));
  float l = (mx + mn) * 0.5;
  if (mx == mn) return vec3(0.0, 0.0, l);
  float d = mx - mn;
  float s = l > 0.5 ? d / (2.0 - mx - mn) : d / (mx + mn);
  float h;
  if (mx == c.r) h = (c.g - c.b) / d + (c.g < c.b ? 6.0 : 0.0);
  else if (mx == c.g) h = (c.b - c.r) / d + 2.0;
  else h = (c.r - c.g) / d + 4.0;
  h /= 6.0;
  return vec3(h, s, l);
}

float hue2rgb(float p, float q, float t) {
  if (t < 0.0) t += 1.0;
  if (t > 1.0) t -= 1.0;
  if (t < 1.0/6.0) return p + (q - p) * 6.0 * t;
  if (t < 1.0/2.0) return q;
  if (t < 2.0/3.0) return p + (q - p) * (2.0/3.0 - t) * 6.0;
  return p;
}

vec3 hslToRgb(vec3 hsl) {
  float h = fract(hsl.x);
  float s = clamp(hsl.y, 0.0, 1.0);
  float l = clamp(hsl.z, 0.0, 1.0);
  if (s == 0.0) return vec3(l);
  float q = l < 0.5 ? l * (1.0 + s) : l + s - l * s;
  float p = 2.0 * l - q;
  return vec3(
    hue2rgb(p, q, h + 1.0/3.0),
    hue2rgb(p, q, h),
    hue2rgb(p, q, h - 1.0/3.0)
  );
}

void main() {
  vec4 texel = texture2D(tOriginal, vUv);
  if (texel.a < 0.04 || uTolerance <= 0.0) {
    gl_FragColor = texel;
    return;
  }
  vec3 hsl = rgbToHsl(texel.rgb);

  // Hue distance (circular)
  float hDist = abs(hsl.x - uSampledHSL.x);
  hDist = min(hDist, 1.0 - hDist) * 360.0;
  float sDist = abs(hsl.y - uSampledHSL.y) * 100.0;
  float lDist = abs(hsl.z - uSampledHSL.z) * 100.0;
  float sim = hDist + sDist * 0.3 + lDist * 0.2;
  float tol = uTolerance * 80.0; // scale back to 0-80 range

  if (sim > tol) {
    gl_FragColor = texel;
    return;
  }

  float falloff = 1.0 - sim / tol;
  vec3 shifted = vec3(
    hsl.x + uHueShift * falloff,
    hsl.y + uSatShift * falloff,
    hsl.z + uBriShift * 0.5 * falloff
  );
  gl_FragColor = vec4(hslToRgb(shifted), texel.a);
}`;

function initRecolorGPU(texture) {
  const w = texture.image?.width || 1024;
  const h = texture.image?.height || 1024;

  recolorRT = new THREE.WebGLRenderTarget(w, h, {
    minFilter: THREE.LinearFilter,
    magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat,
  });

  recolorMat = new THREE.ShaderMaterial({
    uniforms: {
      tOriginal: { value: texture },
      uSampledHSL: { value: new THREE.Vector3(0, 0, 0) },
      uHueShift: { value: 0 },
      uSatShift: { value: 0 },
      uBriShift: { value: 0 },
      uTolerance: { value: 0.375 }, // 30/80
    },
    vertexShader: RECOLOR_VS,
    fragmentShader: RECOLOR_FS,
    depthTest: false,
    depthWrite: false,
  });

  recolorScene2 = new THREE.Scene();
  const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), recolorMat);
  recolorScene2.add(quad);
  recolorCam2 = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
}

function runRecolorGPU() {
  if (!recolorMat || !recolorRT) return;
  renderer.setRenderTarget(recolorRT);
  renderer.render(recolorScene2, recolorCam2);
  renderer.setRenderTarget(null);
}

function applyRecolorToMaterial() {
  if (!sampledTexInfo || !recolorRT) return;
  // Swap material's map to the GPU-recolored render target
  sampledTexInfo.material.map = recolorRT.texture;
  sampledTexInfo.material.needsUpdate = true;
}

// Read GPU render target to canvas (only called on save — expensive)
function readRecolorToCanvas(targetCanvas) {
  if (!recolorRT) return;
  const w = recolorRT.width, h = recolorRT.height;
  targetCanvas.width = w; targetCanvas.height = h;
  const ctx = targetCanvas.getContext('2d');
  const buf = new Uint8Array(w * h * 4);
  renderer.readRenderTargetPixels(recolorRT, 0, 0, w, h, buf);
  const imgData = ctx.createImageData(w, h);
  for (let y = 0; y < h; y++) {
    const srcRow = (h - 1 - y) * w * 4;
    imgData.data.set(buf.subarray(srcRow, srcRow + w * 4), y * w * 4);
  }
  ctx.putImageData(imgData, 0, 0);
}

function scheduleRecolor() {
  // Just update uniforms and render on next frame — GPU does the rest
  if (!recolorMat) return;
  const hueShift = parseInt(document.getElementById('rc-hue').value) / 360;
  const satShift = parseInt(document.getElementById('rc-sat').value) / 100;
  const briShift = parseInt(document.getElementById('rc-bri').value) / 100;
  const tolerance = parseInt(document.getElementById('rc-tol').value) / 80;

  recolorMat.uniforms.uHueShift.value = hueShift;
  recolorMat.uniforms.uSatShift.value = satShift;
  recolorMat.uniforms.uBriShift.value = briShift;
  recolorMat.uniforms.uTolerance.value = tolerance;

  runRecolorGPU();
  applyRecolorToMaterial();
}

// ---- Color picker: compute HSL shift from sampled → target ----
document.getElementById('rc-color-picker').addEventListener('input', (e) => {
  if (!sampledColor) return;
  const hex = e.target.value;
  document.getElementById('target-swatch').style.background = hex;

  // Parse target color
  const tr = parseInt(hex.slice(1,3), 16);
  const tg = parseInt(hex.slice(3,5), 16);
  const tb = parseInt(hex.slice(5,7), 16);
  const [tH, tS, tL] = rgbToHsl(tr, tg, tb);
  const [sH, sS, sL] = rgbToHsl(sampledColor.r, sampledColor.g, sampledColor.b);

  // Compute shortest hue shift
  let hShift = tH - sH;
  if (hShift > 180) hShift -= 360;
  if (hShift < -180) hShift += 360;
  const sShift = tS - sS;
  const lShift = (tL - sL) * 2; // briShift is multiplied by 0.5 in applyRecolorFast

  // Set sliders
  document.getElementById('rc-hue').value = Math.round(hShift);
  document.getElementById('rc-hue-val').textContent = Math.round(hShift);
  document.getElementById('rc-sat').value = Math.round(Math.max(-100, Math.min(100, sShift)));
  document.getElementById('rc-sat-val').textContent = Math.round(Math.max(-100, Math.min(100, sShift)));
  document.getElementById('rc-bri').value = Math.round(Math.max(-100, Math.min(100, lShift)));
  document.getElementById('rc-bri-val').textContent = Math.round(Math.max(-100, Math.min(100, lShift)));

  scheduleRecolor();
});

// Apply & Save to VRM
document.getElementById('rc-apply').addEventListener('click', async () => {
  if (!sampledTexInfo || !recolorRT) return;

  // Read GPU result to canvas (only done on save)
  runRecolorGPU();
  readRecolorToCanvas(recolorCanvas);

  const blob = await new Promise(r => recolorCanvas.toBlob(r, 'image/png'));

  // Find the image index for this texture
  const texIndex = sampledTexInfo.texIndex;
  if (texIndex < 0) {
    showToast('Could not find texture index');
    return;
  }
  const gltfTextures = gltfData.parser.json.textures || [];
  const imageIndex = gltfTextures[texIndex]?.source ?? -1;
  if (imageIndex < 0) {
    showToast('Could not find image index');
    return;
  }

  // Send modified PNG to server
  const arrayBuf = await blob.arrayBuffer();
  const resp = await fetch(`/api/texture/${imageIndex}`, {
    method: 'POST',
    headers: { 'Content-Type': 'image/png' },
    body: arrayBuf,
  });

  if (resp.ok) {
    // Update original so further edits stack correctly
    originalTexData = recolorCtx.getImageData(0, 0, recolorCanvas.width, recolorCanvas.height);
    // Create new texture from saved data for the GPU pipeline
    const savedTex = new THREE.CanvasTexture(recolorCanvas);
    savedTex.flipY = sampledTexInfo.texture.flipY;
    savedTex.colorSpace = sampledTexInfo.texture.colorSpace;
    sampledTexInfo.texture = savedTex;
    if (recolorMat) recolorMat.uniforms.tOriginal.value = savedTex;
    // Reset sliders
    for (const id of ['rc-hue', 'rc-sat', 'rc-bri']) {
      document.getElementById(id).value = '0';
      document.getElementById(id + '-val').textContent = '0';
    }
    showToast('Texture saved to VRM');
  } else {
    showToast('Save failed');
  }
});

function categorize(name, rules) {
  for (const [cat, re] of Object.entries(rules)) { if (re.test(name)) return cat; }
  return 'Other';
}

// ================ UI BUILDERS ================

function collectMeshes() {
  const meshes = [];
  if (!vrm) return meshes;
  vrm.scene.traverse((obj) => {
    if (obj.isMesh || obj.isSkinnedMesh) {
      const info = { name: obj.name, object: obj, visible: obj.visible,
        vertices: obj.geometry?.attributes?.position?.count || 0,
        shapeKeys: [], materials: [] };
      if (obj.morphTargetDictionary) {
        for (const [name, idx] of Object.entries(obj.morphTargetDictionary)) {
          info.shapeKeys.push({ name, index: idx, value: obj.morphTargetInfluences?.[idx] || 0 });
        }
        info.shapeKeys.sort((a, b) => a.name.localeCompare(b.name));
      }
      info.materials = (Array.isArray(obj.material) ? obj.material : [obj.material]).filter(Boolean);
      meshes.push(info);
    }
  });
  meshes.sort((a, b) => a.name.localeCompare(b.name));
  return meshes;
}

function buildParts(meshes) {
  const c = document.getElementById('parts-list'); c.innerHTML = '';
  for (const mesh of meshes) {
    const item = document.createElement('div'); item.className = 'part-item';
    const toggle = document.createElement('div');
    toggle.className = `part-toggle ${mesh.visible ? 'on' : ''}`;
    toggle.addEventListener('click', (e) => {
      e.stopPropagation(); mesh.object.visible = !mesh.object.visible;
      toggle.classList.toggle('on');
    });
    const name = document.createElement('span'); name.className = 'part-name'; name.textContent = mesh.name;
    const info = document.createElement('span'); info.className = 'part-info';
    info.textContent = `${mesh.vertices.toLocaleString()}v` + (mesh.shapeKeys.length ? ` / ${mesh.shapeKeys.length}sk` : '');
    item.append(toggle, name, info); c.appendChild(item);
    item.addEventListener('click', () => {
      c.querySelectorAll('.part-item').forEach(p => p.classList.remove('selected'));
      item.classList.add('selected');
      c.querySelectorAll('.part-detail').forEach(d => d.remove());
      if (!mesh.shapeKeys.length) return;
      const detail = document.createElement('div'); detail.className = 'part-detail';
      detail.style.cssText = 'background:var(--panel2);border-bottom:1px solid var(--border);padding:6px 0';
      for (const sk of mesh.shapeKeys) {
        if (sk.name === 'Basis') continue;
        detail.appendChild(makeSlider(sk.name, sk.value, (v) => {
          mesh.object.morphTargetInfluences[sk.index] = v;
          trackWeight(mesh, sk.name, v);
        }));
      }
      item.after(detail);
    });
  }
}

function buildGroupedTab(meshes, containerId, faceRules, bodyRules, isFace) {
  const c = document.getElementById(containerId); c.innerHTML = '';
  if (isFace && vrm?.expressionManager) {
    c.appendChild(makeCategory('VRM Expressions', vrm.expressionManager.expressions.length, (body) => {
      for (const expr of vrm.expressionManager.expressions) {
        body.appendChild(makeSlider(expr.expressionName, 0, (v) => vrm.expressionManager.setValue(expr.expressionName, v)));
      }
    }));
  }
  const grouped = {};
  for (const mesh of meshes) {
    for (const sk of mesh.shapeKeys) {
      if (sk.name === 'Basis') continue;
      const rules = isFace ? faceRules : bodyRules;
      const cat = categorize(sk.name, rules);
      if (isFace && cat === 'Other') continue;
      if (!isFace) {
        const fc = categorize(sk.name, faceRules);
        if (fc !== 'Other' && mesh.name !== 'Body_Base') continue;
      }
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push({ ...sk, mesh });
    }
  }
  for (const [cat, items] of Object.entries(grouped)) {
    c.appendChild(makeCategory(cat, items.length, (body) => {
      for (const item of items) {
        body.appendChild(makeSlider(item.name, item.value, (v) => {
          item.mesh.object.morphTargetInfluences[item.index] = v;
          trackWeight(item.mesh, item.name, v);
        }, item.mesh.name));
      }
    }, isFace));
  }
}

function buildMaterialTab(meshes) {
  const c = document.getElementById('material-list'); c.innerHTML = '';
  const seen = new Set();
  for (const mesh of meshes) {
    for (const mat of mesh.materials) {
      if (seen.has(mat.uuid)) continue; seen.add(mat.uuid);
      const section = document.createElement('div'); section.className = 'category';

      header.addEventListener('click', () => section.classList.toggle('collapsed'));
      const body = document.createElement('div'); body.className = 'category-body';

      if (mat.emissive) body.appendChild(makeColorPicker('Emissive', mat.emissive, (c) => mat.emissive.copy(c)));

}

// ---- Modification tracking ----
function trackWeight(mesh, skName, value) {
  const idx = findGltfMeshIndex(mesh);
  if (idx < 0) return;
  if (!modifiedWeights[idx]) modifiedWeights[idx] = {};
  modifiedWeights[idx][skName] = value;
}
function findGltfMeshIndex(meshInfo) {
  const gm = gltfData?.parser?.json?.meshes || [];
  for (let i = 0; i < gm.length; i++) { if (gm[i].name === meshInfo.name) return i; }
  return -1;
}
function trackMaterialColor(mat) {
  const gm = gltfData?.parser?.json?.materials || [];
  for (let i = 0; i < gm.length; i++) {
    if (gm[i].name === mat.name) {
      modifiedMaterials[i] = { baseColor: [mat.color.r, mat.color.g, mat.color.b, mat.opacity ?? 1] };
      break;
    }
  }
}

// ---- Save all ----
document.getElementById('save-all').addEventListener('click', async () => {
  const payload = {};
  if (Object.keys(modifiedWeights).length) {
    const wp = {};
    const gm = gltfData.parser.json.meshes || [];
    for (const [mi, skMap] of Object.entries(modifiedWeights)) {
      const mesh = gm[parseInt(mi)]; if (!mesh) continue;
      const nt = mesh.primitives?.[0]?.targets?.length || 0;
      const w = mesh.weights ? [...mesh.weights] : new Array(nt).fill(0);
      const nm = {};
      const threeMesh = findThreeMesh(mesh.name);
      if (threeMesh?.morphTargetDictionary) Object.entries(threeMesh.morphTargetDictionary).forEach(([n,i]) => nm[n]=i);
      for (const [name, val] of Object.entries(skMap)) { const i = nm[name]; if (i !== undefined && i < w.length) w[i] = val; }
      wp[mi] = w;
    }
    payload.weights = wp;
  }
  if (Object.keys(modifiedMaterials).length) payload.materials = modifiedMaterials;

  const metaInputs = document.querySelectorAll('#meta-fields input');
  if (metaInputs.length) {
    const meta = {};
    metaInputs.forEach(inp => {
      const k = inp.dataset.key, v = inp.value;
      meta[k] = k === 'authors' ? v.split(',').map(s => s.trim()).filter(Boolean) :
                (k === 'texture' || k === 'thumbnailImage') ? (parseInt(v) || 0) : v;
    });
    await fetch('/api/meta', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(meta) });
  }
  if (payload.weights || payload.materials) {
    await fetch('/api/save-customization', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  }
  showToast('Saved');
});

function findThreeMesh(name) {
  let found = null;
  vrm?.scene.traverse(obj => { if ((obj.isMesh || obj.isSkinnedMesh) && obj.name === name) found = obj; });
  return found;
}

// ---- Load VRM ----
const loader = new GLTFLoader();
loader.register((parser) => new VRMLoaderPlugin(parser));

async function loadVRM() {
  setStatus('Loading VRM...');
  const resp = await fetch('/api/vrm');
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  loader.load(url, (loaded) => {
    gltfData = loaded;
    if (vrm) { VRMUtils.deepDispose(vrm.scene); scene.remove(vrm.scene); }
    vrm = loaded.userData.vrm;
    VRMUtils.rotateVRM0(vrm);
    scene.add(vrm.scene);
    vrm.scene.updateMatrixWorld(true);

    // Orbit target = center of character, computed from bone world positions
    const hipsNode = vrm.humanoid?.getNormalizedBoneNode('hips');
    const headNode = vrm.humanoid?.getNormalizedBoneNode('head');
    const hipsW = new THREE.Vector3();
    const headW = new THREE.Vector3();
    let targetPos, modelHeight;

    if (hipsNode && headNode) {
      hipsNode.getWorldPosition(hipsW);
      headNode.getWorldPosition(headW);
      targetPos = new THREE.Vector3().lerpVectors(hipsW, headW, 0.5);
      modelHeight = headW.y - hipsW.y + 0.3;
    } else {
      const box = new THREE.Box3().setFromObject(vrm.scene);
      targetPos = box.getCenter(new THREE.Vector3());
      modelHeight = box.getSize(new THREE.Vector3()).y;
    }

    console.log('Orbit target:', targetPos, 'Height:', modelHeight);
    controls.target.copy(targetPos);
    // Camera in front: offset along the direction the model faces (-Z after rotateVRM0)
    camera.position.set(targetPos.x, targetPos.y + modelHeight * 0.1, targetPos.z - modelHeight * 1.5);
    controls.update();
    URL.revokeObjectURL(url);

    const meshes = collectMeshes();
    buildParts(meshes);
    buildGroupedTab(meshes, 'shape-categories', FACE_CATEGORIES, BODY_CATEGORIES, false);
    buildGroupedTab(meshes, 'face-categories', FACE_CATEGORIES, BODY_CATEGORIES, true);
    buildMaterialTab(meshes);
    buildMetaTab();
    setupSearch('shape-search', 'shape-categories');
    setupSearch('face-search', 'face-categories');

    setStatus(`${meshes.length} meshes | ${meshes.reduce((a,m) => a+m.shapeKeys.length, 0)} shape keys | Click model to recolor`);
  }, (p) => { if (p.total) setStatus(`Loading... ${Math.round(p.loaded/p.total*100)}%`); },
  (err) => { setStatus(`Error: ${err.message}`); });
}

// ---- Render ----
function animate() {
  requestAnimationFrame(animate);
  if (vrm) vrm.update(clock.getDelta());
  controls.update();
  renderer.render(scene, camera);
}
loadVRM();
animate();
</script>
