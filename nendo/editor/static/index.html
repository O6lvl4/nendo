<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nendo editor</title>
<style>
:root {
  --bg: #111118;
  --panel: #1a1a28;
  --panel2: #222235;
  --border: #2a2a40;
  --text: #e8e8f0;
  --dim: #7878a0;
  --accent: #00ff99;
  --accent-dim: rgba(0,255,153,0.15);
  --accent2: #4cc9f0;
  --warn: #ff6b6b;
  --input-bg: #14142a;
  --hover: #2a2a50;
  --radius: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  overflow: hidden;
  height: 100vh;
  display: flex;
}

#viewport { flex: 1; position: relative; }
canvas { display: block; width: 100%; height: 100%; }
#viewport-overlay {
  position: absolute; top: 12px; left: 12px;
  display: flex; gap: 6px;
}
.view-btn {
  padding: 5px 10px;
  background: rgba(20,20,40,0.8);
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 11px;
  backdrop-filter: blur(8px);
}
.view-btn:hover { color: var(--text); border-color: var(--accent); }

#recolor-hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,255,153,0.9); color: #000; padding: 8px 20px;
  border-radius: var(--radius); font-weight: 600; font-size: 13px;
  display: none; pointer-events: none;
}
#viewport.recolor-mode { cursor: crosshair; }
#viewport.recolor-mode #recolor-hint { display: block; }

#panel {
  width: 380px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 10px 16px; font-size: 14px; font-weight: 600;
  border-bottom: 1px solid var(--border); color: var(--accent);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-header .save-btn {
  padding: 4px 14px; background: var(--accent); color: #000;
  border: none; border-radius: var(--radius); cursor: pointer;
  font-size: 12px; font-weight: 600;
}
.panel-header .save-btn:hover { opacity: 0.85; }

.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--panel2); }
.tab {
  flex: 1; padding: 10px 4px; text-align: center; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--dim);
  font-size: 12px; font-weight: 500; transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.tab-content { display: none; flex: 1; overflow-y: auto; }
.tab-content.active { display: block; }
.tab-content::-webkit-scrollbar { width: 5px; }
.tab-content::-webkit-scrollbar-track { background: transparent; }
.tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.part-item {
  display: flex; align-items: center; padding: 8px 16px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background 0.1s; gap: 10px;
}
.part-item:hover { background: var(--hover); }
.part-item.selected { background: var(--accent-dim); }
.part-toggle {
  width: 18px; height: 18px; border: 1.5px solid var(--dim);
  border-radius: 3px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; cursor: pointer;
  font-size: 12px; color: var(--accent); transition: all 0.1s;
}
.part-toggle.on { border-color: var(--accent); background: var(--accent-dim); }
.part-toggle.on::after { content: "\2713"; }
.part-name { flex: 1; font-size: 13px; }
.part-info { font-size: 11px; color: var(--dim); }

.category { border-bottom: 1px solid var(--border); }
.category-header {
  display: flex; align-items: center; padding: 10px 16px;
  cursor: pointer; user-select: none; gap: 8px;
  font-weight: 500; font-size: 13px; color: var(--accent2);
  background: var(--panel2);
}
.category-header:hover { background: var(--hover); }
.category-arrow { font-size: 10px; transition: transform 0.15s; color: var(--dim); }
.category.collapsed .category-arrow { transform: rotate(-90deg); }
.category.collapsed .category-body { display: none; }
.category-body { padding: 6px 0; }
.category-count { font-size: 11px; color: var(--dim); margin-left: auto; }

.slider-row {
  display: flex; align-items: center; padding: 3px 16px 3px 24px; gap: 8px;
}
.slider-row label {
  min-width: 110px; font-size: 11px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; color: var(--dim); flex-shrink: 0;
}
.slider-row label:hover { color: var(--text); }
.slider-row input[type="range"] { flex: 1; accent-color: var(--accent); height: 3px; }
.slider-row .val {
  min-width: 30px; text-align: right; font-size: 11px;
  font-variant-numeric: tabular-nums; color: var(--accent);
}
.slider-row.modified label { color: var(--accent); }

.color-row {
  display: flex; align-items: center; padding: 6px 16px 6px 24px; gap: 10px;
}
.color-row label { min-width: 80px; font-size: 12px; color: var(--dim); }
.color-swatch {
  width: 28px; height: 28px; border-radius: 4px;
  border: 2px solid var(--border); cursor: pointer;
  position: relative; overflow: hidden;
}
.color-swatch input[type="color"] {
  position: absolute; inset: -4px; width: 36px; height: 36px;
  border: none; cursor: pointer; opacity: 0;
}
.color-hex { font-size: 11px; color: var(--dim); font-family: monospace; }

.search-box { padding: 8px 16px; border-bottom: 1px solid var(--border); }
.search-box input {
  width: 100%; background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); padding: 7px 10px; border-radius: var(--radius); font-size: 12px;
}
.search-box input:focus { outline: none; border-color: var(--accent2); }

.field { display: flex; align-items: center; padding: 5px 16px; gap: 10px; }
.field label { min-width: 100px; font-size: 12px; color: var(--dim); }
.field input[type="text"] {
  flex: 1; background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 12px;
}
.field input:focus { outline: none; border-color: var(--accent2); }

/* Recolor panel */
.recolor-panel { padding: 12px 16px; }
.recolor-panel .instruction {
  padding: 10px; background: var(--panel2); border-radius: var(--radius);
  color: var(--dim); font-size: 12px; line-height: 1.5; margin-bottom: 10px;
}
.sampled-color-preview {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.sampled-swatch {
  width: 40px; height: 40px; border-radius: var(--radius);
  border: 2px solid var(--border);
}
.recolor-controls { display: none; }
.recolor-controls.active { display: block; }
.recolor-actions {
  display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.recolor-actions button {
  flex: 1; padding: 8px; border-radius: var(--radius); cursor: pointer;
  font-size: 12px; font-weight: 600; border: 1px solid var(--border);
}
.recolor-actions .apply-btn {
  background: var(--accent); color: #000; border-color: var(--accent);
}
.recolor-actions .reset-btn {
  background: var(--input-bg); color: var(--text);
}

/* Texture preview in recolor */
.texture-preview {
  margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px;
}
.texture-preview canvas {
  width: 100%; border-radius: var(--radius);
  border: 1px solid var(--border);
}
.texture-preview .tex-name { font-size: 11px; color: var(--dim); margin-bottom: 6px; }

#status {
  padding: 6px 16px; font-size: 11px; color: var(--dim);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: #000; padding: 8px 24px;
  border-radius: var(--radius); font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.25s; z-index: 100; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="viewport">
  <canvas id="canvas"></canvas>
  <div id="viewport-overlay">
    <button class="view-btn" data-view="full">Full</button>
    <button class="view-btn" data-view="face">Face</button>

</div>

<div id="panel">
  <div class="panel-header">

      <input type="text" id="shape-search" placeholder="Search..." style="flex:1;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:var(--radius);font-size:12px">
      <button id="bake-btn" style="padding:6px 14px;background:#ff6b6b;color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap">Bake</button>
    </div>
    <div id="shape-categories"></div>
  </div>
  <div id="tab-face" class="tab-content">
    <div class="search-box"><input type="text" id="face-search" placeholder="Search face shape keys..."></div>
    <div id="face-categories"></div>
  </div>

  <!-- Textures tab -->
  <div id="tab-recolor" class="tab-content active">
    <div style="padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px">
      <button id="tex-export-btn" style="flex:1;padding:6px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);cursor:pointer;font-size:12px">Export All</button>
      <label id="tex-import-btn" style="flex:1;padding:6px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:600;text-align:center">
        Import
        <input type="file" id="tex-import-input" multiple accept=".png,.jpg,.jpeg" style="display:none">
      </label>
    </div>
    <div id="tex-list" style="padding:8px 0"></div>
  </div>

  <div id="tab-material" class="tab-content"><div id="material-list"></div></div>
  <div id="tab-meta" class="tab-content"><div style="padding:10px 0"><div id="meta-fields"></div></div></div>

  <div id="status">Loading...</div>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as VRMModule from '@pixiv/three-vrm';

const { VRMLoaderPlugin, VRMUtils } = VRMModule;

// ---- State ----
let vrm = null;
let gltfData = null;
const clock = new THREE.Clock();
const modifiedWeights = {};
const modifiedMaterials = {};


// ---- Three.js ----
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111118);

const camera = new THREE.PerspectiveCamera(28, 1, 0.05, 100);
camera.position.set(0, 1.3, -2.5);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(1, 3, -3);
scene.add(dirLight);
scene.add(new THREE.DirectionalLight(0xaabbff, 0.4)).position.set(-2, 1, 2);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const grid = new THREE.GridHelper(10, 20, 0x222240, 0x1a1a30);
scene.add(grid);

const raycaster = new THREE.Raycaster();

function resize() {
  const vp = document.getElementById('viewport');
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  camera.aspect = vp.clientWidth / vp.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ---- Helpers ----
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ---- Color conversion ----
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  return [h * 360, s * 100, l * 100];
}

function hslToRgb(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;
  if (h < 60) { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; b = x; }
  else if (h < 240) { g = x; b = c; }
  else if (h < 300) { r = x; b = c; }
  else { r = c; b = x; }
  return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}

function hueDist(h1, h2) {
  const d = Math.abs(h1 - h2);
  return Math.min(d, 360 - d);
}

// ---- Camera ----
function moveCameraTo(pos, target) {
  camera.position.set(...pos); controls.target.set(...target); controls.update();
}
function getModelCenter() {
  if (!vrm) return { center: [0,1,0], height: 1.6, headY: 1.5 };
  vrm.scene.updateMatrixWorld(true);
  const hips = vrm.humanoid?.getNormalizedBoneNode('hips');
  const head = vrm.humanoid?.getNormalizedBoneNode('head');
  if (hips && head) {
    const hw = new THREE.Vector3(); hips.getWorldPosition(hw);
    const hdw = new THREE.Vector3(); head.getWorldPosition(hdw);
    const cx = (hw.x + hdw.x) / 2, cy = (hw.y + hdw.y) / 2, cz = (hw.z + hdw.z) / 2;
    return { center: [cx, cy, cz], height: hdw.y - hw.y + 0.3, headY: hdw.y + 0.15 };
  }
  const box = new THREE.Box3().setFromObject(vrm.scene);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  return { center: [c.x,c.y,c.z], height: s.y, headY: c.y + s.y * 0.35 };
}
document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    const { center: c, height: h, headY } = getModelCenter();
    const views = {
      full:  () => moveCameraTo([0, c[1]+h*0.1, h*1.5], c),
      face:  () => moveCameraTo([0, headY, 0.55], [0, headY, 0]),
      front: () => moveCameraTo([0, c[1], h*1.2], c),
      side:  () => moveCameraTo([h*1.2, c[1], 0], c),
      back:  () => moveCameraTo([0, c[1], -h*1.2], c),
    };
    views[btn.dataset.view]?.();
  });
});

// ---- Tabs ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});
// Init recolor mode active

// ================ RECOLOR TOOL ================

// ================ TEXTURES: list + export + import ================
async function buildTextureList() {
  const resp = await fetch('/api/textures');
  const textures = await resp.json();
  const container = document.getElementById('tex-list');
  container.innerHTML = '';

  for (const tex of textures) {
    const item = document.createElement('div');
    item.className = 'part-item';

    const thumb = document.createElement('img');
    thumb.src = `/api/texture/${tex.index}`;
    thumb.style.cssText = 'width:40px;height:40px;object-fit:contain;border-radius:4px;background:#000;border:1px solid var(--border)';

    const info = document.createElement('div');
    info.style.flex = '1';
    info.innerHTML = `<div style="font-size:12px">${tex.name}</div>
      <div style="font-size:11px;color:var(--dim)">${tex.materials.join(', ') || 'no material'} &middot; ${(tex.byteLength/1024).toFixed(0)}KB</div>`;

    item.append(thumb, info);
    container.appendChild(item);
  }
}

// Export all textures as zip
document.getElementById('tex-export-btn').addEventListener('click', () => {
  showToast('Exporting...');
  const a = document.createElement('a');
  a.href = '/api/textures/export';
  a.download = 'textures.zip';
  a.click();
  setTimeout(() => showToast('Exported textures.zip'), 1000);
});

// Import edited textures
document.getElementById('tex-import-input').addEventListener('change', async (e) => {
  const files = e.target.files;
  if (!files.length) return;

  // Get texture list to match filenames
  const resp = await fetch('/api/textures');
  const textures = await resp.json();

  let replaced = 0;
  for (const file of files) {
    const baseName = file.name.replace(/\.(png|jpg|jpeg)$/i, '');
    const match = textures.find(t => t.name === baseName);
    if (!match) {
      console.log(`No match for: ${file.name}`);
      continue;
    }
    const buf = await file.arrayBuffer();
    const r = await fetch(`/api/texture/${match.index}`, {
      method: 'POST',
      headers: { 'Content-Type': file.type || 'image/png' },
      body: buf,
    });
    if (r.ok) replaced++;
  }

  if (replaced > 0) {
    showToast(`Imported ${replaced} texture(s) — reloading...`);
    setTimeout(() => location.reload(), 500);
  } else {
    showToast('No matching textures found');
  }
  e.target.value = '';
});

void 0;
// ================ SHAPE KEY CATEGORIZATION ================

const FACE_CATEGORIES = {
  'Eyes':      /^(eye_|Eye_|LowerEyelid|highlight_|eyelash_|eyelid_|eye[_\s])/i,
  'Mouth':     /^(mouth_|A$|I$|U$|E$|O$|A_|I_|U_|E_|O_|bero_|yaeba|gizaba|upper_tooth|lower_tooth)/i,
  'Eyebrows':  /^eyebrow_/i,
  'Face':      /^(cheek_|jaw_|nose_|ear_|face_)/i,
  'Effects':   /^Option_/i,
  'Lip Sync':  /^vrc\./i,
  'MMD':       /^(まばたき|笑い|ウィンク|なごみ|びっくり|じと目|ｷﾘ|星目|はぁと|瞳|光下|ハイライト|恐ろしい|Λ|▲|ワ|ω|□|はん|ん$|あ２|えー|にやり|にっこり|ぺろ|口角|真面目|困る|にこり|怒り|上$|下$|照れ|涙|はちゅ)/,
};
const BODY_CATEGORIES = {
  'Chest':     /^(Breasts?_|Nipple_|Bra_)/i,
  'Body':      /^(Waist_|Foot_|Nail_|Shoulder_OFF|face_|jaw_)/i,
  'Shrink':    /_(OFF|OFF_[LR])$/,
  'Hair':      /^(Bangs?_|Hair_|Ahoge|HairClip)/i,
  'Boots':     /^Boots?_/i,
  'Socks':     /^(Socks_|High-Socks|Crew-Socks|Knee)/i,
  'Blouse':    /^Blouse_/i,
};

function categorize(name, rules) {
  for (const [cat, re] of Object.entries(rules)) { if (re.test(name)) return cat; }
  return 'Other';
}

// ================ UI BUILDERS ================

function collectMeshes() {
  const meshes = [];
  if (!vrm) return meshes;
  vrm.scene.traverse((obj) => {
    if (obj.isMesh || obj.isSkinnedMesh) {
      const info = { name: obj.name, object: obj, visible: obj.visible,
        vertices: obj.geometry?.attributes?.position?.count || 0,
        shapeKeys: [], materials: [] };
      if (obj.morphTargetDictionary) {
        for (const [name, idx] of Object.entries(obj.morphTargetDictionary)) {
          info.shapeKeys.push({ name, index: idx, value: obj.morphTargetInfluences?.[idx] || 0 });
        }
        info.shapeKeys.sort((a, b) => a.name.localeCompare(b.name));
      }
      info.materials = (Array.isArray(obj.material) ? obj.material : [obj.material]).filter(Boolean);
      meshes.push(info);
    }
  });
  meshes.sort((a, b) => a.name.localeCompare(b.name));
  return meshes;
}

function buildParts(meshes) {
  const c = document.getElementById('parts-list'); c.innerHTML = '';
  for (const mesh of meshes) {
    const item = document.createElement('div'); item.className = 'part-item';
    const toggle = document.createElement('div');
    toggle.className = `part-toggle ${mesh.visible ? 'on' : ''}`;
    toggle.addEventListener('click', (e) => {
      e.stopPropagation(); mesh.object.visible = !mesh.object.visible;
      toggle.classList.toggle('on');
    });
    const name = document.createElement('span'); name.className = 'part-name'; name.textContent = mesh.name;
    const info = document.createElement('span'); info.className = 'part-info';
    info.textContent = `${mesh.vertices.toLocaleString()}v` + (mesh.shapeKeys.length ? ` / ${mesh.shapeKeys.length}sk` : '');
    item.append(toggle, name, info); c.appendChild(item);
    item.addEventListener('click', () => {
      c.querySelectorAll('.part-item').forEach(p => p.classList.remove('selected'));
      item.classList.add('selected');
      c.querySelectorAll('.part-detail').forEach(d => d.remove());
      if (!mesh.shapeKeys.length) return;
      const detail = document.createElement('div'); detail.className = 'part-detail';
      detail.style.cssText = 'background:var(--panel2);border-bottom:1px solid var(--border);padding:6px 0';
      for (const sk of mesh.shapeKeys) {
        if (sk.name === 'Basis') continue;
        detail.appendChild(makeSlider(sk.name, sk.value, (v) => {
          mesh.object.morphTargetInfluences[sk.index] = v;
          trackWeight(mesh, sk.name, v);
        }));
      }
      item.after(detail);
    });
  }
}

function buildGroupedTab(meshes, containerId, faceRules, bodyRules, isFace) {
  const c = document.getElementById(containerId); c.innerHTML = '';
  if (isFace && vrm?.expressionManager) {
    c.appendChild(makeCategory('VRM Expressions', vrm.expressionManager.expressions.length, (body) => {
      for (const expr of vrm.expressionManager.expressions) {
        body.appendChild(makeSlider(expr.expressionName, 0, (v) => vrm.expressionManager.setValue(expr.expressionName, v)));
      }
    }));
  }
  const grouped = {};
  for (const mesh of meshes) {
    for (const sk of mesh.shapeKeys) {
      if (sk.name === 'Basis') continue;
      const rules = isFace ? faceRules : bodyRules;
      const cat = categorize(sk.name, rules);
      if (isFace && cat === 'Other') continue;
      if (!isFace) {
        const fc = categorize(sk.name, faceRules);
        if (fc !== 'Other' && mesh.name !== 'Body_Base') continue;
      }
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push({ ...sk, mesh });
    }
  }
  for (const [cat, items] of Object.entries(grouped)) {
    c.appendChild(makeCategory(cat, items.length, (body) => {
      for (const item of items) {
        body.appendChild(makeSlider(item.name, item.value, (v) => {
          item.mesh.object.morphTargetInfluences[item.index] = v;
          trackWeight(item.mesh, item.name, v);
        }, item.mesh.name));
      }
    }, isFace));
  }
}

function buildMaterialTab(meshes) {
  const c = document.getElementById('material-list'); c.innerHTML = '';
  const seen = new Set();
  for (const mesh of meshes) {
    for (const mat of mesh.materials) {
      if (seen.has(mat.uuid)) continue; seen.add(mat.uuid);
      const section = document.createElement('div'); section.className = 'category';
      const header = document.createElement('div'); header.className = 'category-header';
      header.innerHTML = `<span class="category-arrow">&#9660;</span> ${mat.name || 'Material'}`;
      header.addEventListener('click', () => section.classList.toggle('collapsed'));
      const body = document.createElement('div'); body.className = 'category-body';
      if (mat.color) body.appendChild(makeColorPicker('Base Color', mat.color, (c) => { mat.color.copy(c); trackMaterialColor(mat); }));
      if (mat.emissive) body.appendChild(makeColorPicker('Emissive', mat.emissive, (c) => mat.emissive.copy(c)));
      if (mat.opacity !== undefined) body.appendChild(makeSlider('Opacity', mat.opacity, (v) => { mat.opacity = v; mat.transparent = v < 1; }));
      section.append(header, body); c.appendChild(section);
    }
  }
}

async function buildMetaTab() {
  const resp = await fetch('/api/meta'); const meta = await resp.json();
  const c = document.getElementById('meta-fields'); c.innerHTML = '';
  for (const [key, val] of Object.entries(meta)) {
    const div = document.createElement('div'); div.className = 'field';
    const label = document.createElement('label'); label.textContent = key;
    const input = document.createElement('input'); input.type = 'text'; input.dataset.key = key;
    input.value = Array.isArray(val) ? val.join(', ') : (val ?? '');
    div.append(label, input); c.appendChild(div);
  }
}

// ---- Shared UI components ----
function makeSlider(label, initVal, onChange, tooltip) {
  const row = document.createElement('div'); row.className = 'slider-row'; row.dataset.label = label.toLowerCase();
  const lbl = document.createElement('label'); lbl.textContent = label; if (tooltip) lbl.title = `${tooltip} / ${label}`;
  const slider = document.createElement('input'); slider.type = 'range'; slider.min = '0'; slider.max = '100';
  slider.value = String(Math.round(initVal * 100));
  const val = document.createElement('span'); val.className = 'val'; val.textContent = slider.value;
  slider.addEventListener('input', () => {
    onChange(parseInt(slider.value) / 100);
    val.textContent = slider.value;
    row.classList.toggle('modified', parseInt(slider.value) !== 0);
  });
  if (initVal > 0) row.classList.add('modified');
  row.append(lbl, slider, val); return row;
}

function makeCategory(title, count, buildFn, collapsed = false) {
  const section = document.createElement('div'); section.className = `category${collapsed ? ' collapsed' : ''}`;
  const header = document.createElement('div'); header.className = 'category-header';
  header.innerHTML = `<span class="category-arrow">&#9660;</span><span>${title}</span><span class="category-count">${count}</span>`;
  const body = document.createElement('div'); body.className = 'category-body'; buildFn(body);
  header.addEventListener('click', () => section.classList.toggle('collapsed'));
  section.append(header, body); return section;
}

function makeColorPicker(label, threeColor, onChange) {
  const row = document.createElement('div'); row.className = 'color-row';
  const lbl = document.createElement('label'); lbl.textContent = label;
  const swatch = document.createElement('div'); swatch.className = 'color-swatch';
  const hex = '#' + threeColor.getHexString(); swatch.style.background = hex;
  const input = document.createElement('input'); input.type = 'color'; input.value = hex;
  const hexLabel = document.createElement('span'); hexLabel.className = 'color-hex'; hexLabel.textContent = hex;
  input.addEventListener('input', () => {
    swatch.style.background = input.value; hexLabel.textContent = input.value;
    onChange(new THREE.Color(input.value));
  });
  swatch.appendChild(input); row.append(lbl, swatch, hexLabel); return row;
}

function setupSearch(inputId, containerId) {
  document.getElementById(inputId)?.addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const c = document.getElementById(containerId);
    c.querySelectorAll('.slider-row').forEach(r => r.style.display = r.dataset.label?.includes(q) ? '' : 'none');
    c.querySelectorAll('.category').forEach(cat => {
      const vis = cat.querySelectorAll('.slider-row:not([style*="display: none"])').length;
      cat.style.display = vis ? '' : 'none';
      if (q && vis) cat.classList.remove('collapsed');
    });
  });
}

// ---- Bake shape keys ----
document.getElementById('bake-btn').addEventListener('click', async () => {
  // Collect all non-zero shape key weights, grouped by mesh name
  const targets = {};
  for (const [meshIdx, skMap] of Object.entries(modifiedWeights)) {
    const gm = gltfData?.parser?.json?.meshes || [];
    const mesh = gm[parseInt(meshIdx)];
    if (!mesh) continue;
    const meshName = mesh.name;
    for (const [name, val] of Object.entries(skMap)) {
      if (val > 0) {
        if (!targets[meshName]) targets[meshName] = {};
        targets[meshName][name] = val;
      }
    }
  }

  if (!Object.keys(targets).length) {
    showToast('No shape keys to bake — adjust sliders first');
    return;
  }

  const count = Object.values(targets).reduce((a, m) => a + Object.keys(m).length, 0);
  if (!confirm(`Bake ${count} shape key(s) permanently into mesh geometry?\nThis modifies the VRM file and cannot be undone.`)) return;

  const resp = await fetch('/api/bake', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ targets }),
  });
  const result = await resp.json();
  if (result.ok) {
    const baked = result.baked || {};
    const names = Object.values(baked).flat();
    showToast(`Baked: ${names.join(', ')}`);
    // Reload VRM to reflect changes
    setTimeout(() => location.reload(), 500);
  } else {
    showToast('Bake failed');
  }
});

// ---- Modification tracking ----
function trackWeight(mesh, skName, value) {
  const idx = findGltfMeshIndex(mesh);
  if (idx < 0) return;
  if (!modifiedWeights[idx]) modifiedWeights[idx] = {};
  modifiedWeights[idx][skName] = value;
}
function findGltfMeshIndex(meshInfo) {
  const gm = gltfData?.parser?.json?.meshes || [];
  for (let i = 0; i < gm.length; i++) { if (gm[i].name === meshInfo.name) return i; }
  return -1;
}
function trackMaterialColor(mat) {
  const gm = gltfData?.parser?.json?.materials || [];
  for (let i = 0; i < gm.length; i++) {
    if (gm[i].name === mat.name) {
      modifiedMaterials[i] = { baseColor: [mat.color.r, mat.color.g, mat.color.b, mat.opacity ?? 1] };
      break;
    }
  }
}

// ---- Save all ----
document.getElementById('save-all').addEventListener('click', async () => {
  const payload = {};
  if (Object.keys(modifiedWeights).length) {
    const wp = {};
    const gm = gltfData.parser.json.meshes || [];
    for (const [mi, skMap] of Object.entries(modifiedWeights)) {
      const mesh = gm[parseInt(mi)]; if (!mesh) continue;
      const nt = mesh.primitives?.[0]?.targets?.length || 0;
      const w = mesh.weights ? [...mesh.weights] : new Array(nt).fill(0);
      const nm = {};
      const threeMesh = findThreeMesh(mesh.name);
      if (threeMesh?.morphTargetDictionary) Object.entries(threeMesh.morphTargetDictionary).forEach(([n,i]) => nm[n]=i);
      for (const [name, val] of Object.entries(skMap)) { const i = nm[name]; if (i !== undefined && i < w.length) w[i] = val; }
      wp[mi] = w;
    }
    payload.weights = wp;
  }
  if (Object.keys(modifiedMaterials).length) payload.materials = modifiedMaterials;

  const metaInputs = document.querySelectorAll('#meta-fields input');
  if (metaInputs.length) {
    const meta = {};
    metaInputs.forEach(inp => {
      const k = inp.dataset.key, v = inp.value;
      meta[k] = k === 'authors' ? v.split(',').map(s => s.trim()).filter(Boolean) :
                (k === 'texture' || k === 'thumbnailImage') ? (parseInt(v) || 0) : v;
    });
    await fetch('/api/meta', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(meta) });
  }
  if (payload.weights || payload.materials) {
    await fetch('/api/save-customization', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  }
  showToast('Saved');
});

function findThreeMesh(name) {
  let found = null;
  vrm?.scene.traverse(obj => { if ((obj.isMesh || obj.isSkinnedMesh) && obj.name === name) found = obj; });
  return found;
}

// ---- Load VRM ----
const loader = new GLTFLoader();
loader.register((parser) => new VRMLoaderPlugin(parser));

async function loadVRM() {
  setStatus('Loading VRM...');
  const resp = await fetch('/api/vrm');
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  loader.load(url, (loaded) => {
    gltfData = loaded;
    if (vrm) { VRMUtils.deepDispose(vrm.scene); scene.remove(vrm.scene); }
    vrm = loaded.userData.vrm;
    VRMUtils.rotateVRM0(vrm);
    scene.add(vrm.scene);
    vrm.scene.updateMatrixWorld(true);

    // Orbit target = center of character, computed from bone world positions
    const hipsNode = vrm.humanoid?.getNormalizedBoneNode('hips');
    const headNode = vrm.humanoid?.getNormalizedBoneNode('head');
    const hipsW = new THREE.Vector3();
    const headW = new THREE.Vector3();
    let targetPos, modelHeight;

    if (hipsNode && headNode) {
      hipsNode.getWorldPosition(hipsW);
      headNode.getWorldPosition(headW);
      targetPos = new THREE.Vector3().lerpVectors(hipsW, headW, 0.5);
      modelHeight = headW.y - hipsW.y + 0.3;
    } else {
      const box = new THREE.Box3().setFromObject(vrm.scene);
      targetPos = box.getCenter(new THREE.Vector3());
      modelHeight = box.getSize(new THREE.Vector3()).y;
    }

    console.log('Orbit target:', targetPos, 'Height:', modelHeight);
    controls.target.copy(targetPos);
    camera.position.set(targetPos.x, targetPos.y + modelHeight * 0.1, targetPos.z + modelHeight * 1.5);
    controls.update();
    URL.revokeObjectURL(url);

    const meshes = collectMeshes();
    buildParts(meshes);
    buildGroupedTab(meshes, 'shape-categories', FACE_CATEGORIES, BODY_CATEGORIES, false);
    buildGroupedTab(meshes, 'face-categories', FACE_CATEGORIES, BODY_CATEGORIES, true);
    buildMaterialTab(meshes);
    buildMetaTab();
    buildTextureList();
    setupSearch('shape-search', 'shape-categories');
    setupSearch('face-search', 'face-categories');

    setStatus(`${meshes.length} meshes | ${meshes.reduce((a,m) => a+m.shapeKeys.length, 0)} shape keys`);
  }, (p) => { if (p.total) setStatus(`Loading... ${Math.round(p.loaded/p.total*100)}%`); },
  (err) => { setStatus(`Error: ${err.message}`); });
}

// ---- Render ----
function animate() {
  requestAnimationFrame(animate);
  if (vrm) vrm.update(clock.getDelta());
  controls.update();
  renderer.render(scene, camera);
}
loadVRM();
animate();

// ---- VRM Drag & Drop ----
const dropOverlay = document.getElementById('drop-overlay');
['dragenter','dragover'].forEach(ev => {
  document.addEventListener(ev, (e) => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
});
['dragleave'].forEach(ev => {
  dropOverlay.addEventListener(ev, () => { dropOverlay.style.display = 'none'; });
});
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  dropOverlay.style.display = 'none';
  const file = [...(e.dataTransfer?.files || [])].find(f => f.name.toLowerCase().endsWith('.vrm'));
  if (!file) { showToast('Drop a .vrm file'); return; }
  showToast(`Uploading ${file.name}...`);
  const buf = await file.arrayBuffer();
  const resp = await fetch('/api/upload-vrm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/octet-stream' },
    body: buf,
  });
  if (resp.ok) {
    showToast('Loaded — reloading...');
    setTimeout(() => location.reload(), 500);
  } else {
    showToast('Upload failed');
  }
});
</script>
